<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>FlowIPTV OneFile</title>

  <!-- Video.js -->
  <link href="https://vjs.zencdn.net/8.10.0/video-js.min.css" rel="stylesheet" />
  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body{background:#0f0f0f;color:#fff;font-family:Arial;margin:0}
    .header{display:flex;gap:10px;padding:10px;border-bottom:1px solid #222}
    input{flex:1;padding:10px;background:#111;border:1px solid #333;color:#fff}
    button{padding:10px;background:#222;color:#fff;border:none;cursor:pointer}
    button:hover{background:#ff0000}
    .main{display:flex;gap:10px;padding:10px}
    .player{flex:2}
    .sidebar{flex:1;max-height:80vh;overflow:auto}
    .item{padding:8px;border-bottom:1px solid #222;cursor:pointer}
    .item:hover{background:#222}
    video{width:100%}
  </style>
</head>

<body>

<div class="header">
  <input id="url" placeholder="Pega M3U / M3U8 / MP4 / Radio" />
  <button onclick="loadUrl()">▶</button>
  <button onclick="parseM3U()">📃</button>
  <button onclick="stop()">⏹</button>
</div>

<div class="main">
  <div class="player">
    <video id="player" class="video-js vjs-big-play-centered" controls></video>
    <audio id="audio" controls style="width:100%;display:none;"></audio>
  </div>
  <div class="sidebar" id="list"></div>
</div>

<script>

/* ================= PLAYER ================= */
let player = videojs('player');
let audio = document.getElementById("audio");

/* ================= PROXY EMBEBIDO ================= */

async function buildProxy(url){
  if(!url) return url;

  // M3U8
  if(url.includes(".m3u8")){
    return await proxyM3U8(url);
  }

  // fetch normal
  try{
    const res = await fetch(url);
    const blob = await res.blob();
    return URL.createObjectURL(blob);
  }catch(e){
    console.warn("CORS fallo");
    return url;
  }
}

async function proxyM3U8(url){
  try{
    const res = await fetch(url);
    const text = await res.text();

    const base = url.substring(0,url.lastIndexOf("/") + 1);

    const rewritten = text.replace(/(?!#)(.*\.ts)/g,(m)=>{
      return m.startsWith("http") ? m : base + m;
    });

    const blob = new Blob([rewritten],{
      type:"application/vnd.apple.mpegurl"
    });

    return URL.createObjectURL(blob);

  }catch(e){
    return url;
  }
}

/* ================= PLAY ================= */

async function play(url,name=""){
  let finalUrl = await buildProxy(url);

  if(url.endsWith(".mp3") || url.includes("radio")){
    player.pause();
    player.src("");
    audio.style.display="block";
    audio.src = finalUrl;
    audio.play();
    return;
  }

  audio.pause();
  audio.style.display="none";

  player.src({
    src: finalUrl,
    type: "application/x-mpegURL"
  });

  player.play();
}

/* ================= LOAD DIRECT ================= */

function loadUrl(){
  let url = document.getElementById("url").value.trim();
  if(!url) return;
  play(url,"Directo");
}

/* ================= STOP ================= */

function stop(){
  player.pause();
  player.src("");
  audio.pause();
  audio.src="";
}

/* ================= PARSER M3U ================= */

async function parseM3U(){
  let url = document.getElementById("url").value.trim();
  if(!url) return;

  try{
    const res = await fetch(url);
    const text = await res.text();

    const lines = text.split("\n");
    let list = document.getElementById("list");
    list.innerHTML="";

    let name = "";

    lines.forEach(line=>{
      line = line.trim();

      if(line.startsWith("#EXTINF")){
        name = line.split(",")[1] || "Canal";
      }
      else if(line && !line.startsWith("#")){
        let div = document.createElement("div");
        div.className="item";
        div.innerText=name;

        div.onclick=()=>{
          play(line,name);
        };

        list.appendChild(div);
      }
    });

  }catch(e){
    alert("Error cargando M3U");
  }
}

</script>

</body>
</html>
