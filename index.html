<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
}

/* 🎬 PLAYER */
.player-container {
    width: 100%;
    height: 100dvh;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 🌟 BANNER PRO */
.banner {
    position: fixed;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 24px;
    border-radius: 40px;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(10px);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.3px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 999;
    animation: fadeIn 1s ease;
}

.banner span {
    color: #00ffae;
    font-weight: bold;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translate(-50%, -20px);
    }
    to {
        opacity: 1;
        transform: translate(-50%, 0);
    }
}

@media (max-width: 600px) {
    .banner {
        font-size: 12px;
        padding: 10px 16px;
    }
}
</style>
</head>

<body>

<!-- 🌟 MENSAJE -->
<div class="banner">
    🚀 Adquiere tu <span>Paquete Premium</span> y disfruta sin interrupciones ni publicidad
</div>

<!-- 🎬 PLAYER -->
<div class="player-container">
    <video id="video" autoplay muted playsinline></video>
</div>

<script>
const video = document.getElementById("video");

/* 🎬 PLAYLIST COMPLETA */
const playlist = [
"https://dl.dropboxusercontent.com/scl/fi/4zbtcy2zdg1upztjvw9ty/tv_Sjow.mp4?rlkey=fz4swcg4iul7kqlq0jdt7rajk",
"https://dl.dropboxusercontent.com/scl/fi/vlyjfym5lkq74j60vv3d7/wsdw.mp4?rlkey=cefh6u2imupuuxlnb3x8g17jt",
"https://dl.dropboxusercontent.com/scl/fi/1tgi7i2xjdfuoin8b9aw1/gag.mp4?rlkey=sqzfdxe5cphqt5a2z4pz5fjn6",
"https://dl.dropboxusercontent.com/scl/fi/6v7230f6drvhrxaxc8282/scdddg.mp4?rlkey=4uf552fthex3e93i28br4t7cd",
"https://dl.dropboxusercontent.com/scl/fi/c4rifovakuhmbvds9ybq2/scdvdv.mp4?rlkey=erq3a307ywolnyev6qd8wpkjk",

/* 🔥 VIDEO ACTUALIZADO */
"https://www.dropbox.com/scl/fi/c10q0u7wx3zyjgb7dub50/TikVid.io_7624632577709575444.mp4?rlkey=fa0q2z97t77vml11j1evn25pw&st=fxzvk8eg&raw=1"
];

let retry = 0;
let lastIndex = -1;

/* 🎲 RANDOM */
function getRandomIndex() {
    let newIndex;
    do {
        newIndex = Math.floor(Math.random() * playlist.length);
    } while (newIndex === lastIndex && playlist.length > 1);

    lastIndex = newIndex;
    return newIndex;
}

/* ▶ PLAY */
function playVideo() {
    const index = getRandomIndex();
    video.src = playlist[index];
    video.load();

    video.play()
    .then(() => retry = 0)
    .catch(() => retryPlay());
}

/* 🔄 RETRY */
function retryPlay() {
    retry++;
    if (retry < 3) {
        setTimeout(playVideo, 1000);
    } else {
        retry = 0;
        playVideo();
    }
}

/* EVENTOS */
video.addEventListener("ended", playVideo);
video.addEventListener("error", retryPlay);

video.addEventListener("waiting", () => {
    setTimeout(() => {
        if (video.readyState < 3) {
            playVideo();
        }
    }, 4000);
});

/* 🚀 START */
playVideo();

/* 🔊 UNMUTE AUTOMÁTICO */
setTimeout(() => {
    video.muted = false;
    video.play().catch(()=>{});
}, 1000);

/* 🔧 CLICK FALLBACK */
document.addEventListener("click", () => {
    video.muted = false;
    video.play();
}, { once: true });

</script>

</body>
</html>
