<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Player PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
}

.player-container {
    width: 100%;
    height: 100vh;
    height: 100svh;
    height: 100dvh;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BANNER */
.banner {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 18px;
    border-radius: 50px;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(12px);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    z-index: 999;
}

.banner span {
    color: #00ffae;
}
</style>
</head>

<body>

<div class="banner">
    🚀 <span>Streaming Premium</span> HD sin cortes
</div>

<div class="player-container">
    <video id="video" autoplay muted playsinline></video>
</div>

<script>
const video = document.getElementById("video");

const playlist = [
"https://dl.dropboxusercontent.com/scl/fi/4zbtcy2zdg1upztjvw9ty/tv_Sjow.mp4?rlkey=fz4swcg4iul7kqlq0jdt7rajk",
"https://dl.dropboxusercontent.com/scl/fi/vlyjfym5lkq74j60vv3d7/wsdw.mp4?rlkey=cefh6u2imupuuxlnb3x8g17jt",
"https://dl.dropboxusercontent.com/scl/fi/1tgi7i2xjdfuoin8b9aw1/gag.mp4?rlkey=sqzfdxe5cphqt5a2z4pz5fjn6",
"https://dl.dropboxusercontent.com/scl/fi/6v7230f6drvhrxaxc8282/scdddg.mp4?rlkey=4uf552fthex3e93i28br4t7cd",
"https://dl.dropboxusercontent.com/scl/fi/c4rifovakuhmbvds9ybq2/scdvdv.mp4?rlkey=erq3a307ywolnyev6qd8wpkjk",
"https://www.dropbox.com/scl/fi/c10q0u7wx3zyjgb7dub50/TikVid.io_7624632577709575444.mp4?rlkey=fa0q2z97t77vml11j1evn25pw&st=fxzvk8eg&raw=1"
];

let shuffled = [];
let current = 0;

/* 🔀 SHUFFLE */
function shufflePlaylist() {
    shuffled = [...playlist]
        .map(v => ({ v, r: Math.random() }))
        .sort((a,b) => a.r - b.r)
        .map(x => x.v);

    current = 0;
}

/* ▶ PLAY */
function playVideo() {
    if (current >= shuffled.length) shufflePlaylist();

    video.src = shuffled[current];
    video.load();

    video.play().catch(()=> {
        setTimeout(playVideo, 1000);
    });

    current++;
}

/* 🎬 END */
video.addEventListener("ended", playVideo);

/* ❌ ERROR */
video.addEventListener("error", playVideo);

/* ⏳ BUFFER FIX */
video.addEventListener("waiting", () => {
    setTimeout(() => {
        if (video.readyState < 3) playVideo();
    }, 3000);
});

/* 🚀 START */
shufflePlaylist();
playVideo();

/* 🔊 AUDIO ACTIVADO A LOS 1 SEGUNDO */
setTimeout(() => {
    video.muted = false;
    video.volume = 1;

    video.play().catch(()=>{});
}, 1000);

/* 📱 CLICK FALLBACK (OBLIGATORIO EN MOBILE) */
document.addEventListener("click", () => {
    video.muted = false;
    video.volume = 1;
    video.play();
}, { once: true });

</script>

</body>
</html>
