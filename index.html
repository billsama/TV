<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    font-family: Arial, sans-serif;
}

.player-container {
    width: 100%;
    height: 100dvh;
    background: #000;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>
</head>

<body>

<div class="player-container">
    <video id="video" autoplay muted playsinline></video>
</div>

<script>
const video = document.getElementById("video");

/* 🎬 PLAYLIST (TUS LINKS ARREGLADOS) */
const playlist = [
"https://dl.dropboxusercontent.com/scl/fi/4zbtcy2zdg1upztjvw9ty/tv_Sjow.mp4?rlkey=fz4swcg4iul7kqlq0jdt7rajk",
"https://dl.dropboxusercontent.com/scl/fi/vlyjfym5lkq74j60vv3d7/wsdw.mp4?rlkey=cefh6u2imupuuxlnb3x8g17jt"
];

let index = 0;
let retry = 0;

/* ▶ REPRODUCIR */
function playVideo() {
    video.src = playlist[index];
    video.load();

    video.play()
    .then(() => retry = 0)
    .catch(() => retryPlay());
}

/* 🔁 SIGUIENTE VIDEO */
function nextVideo() {
    index = (index + 1) % playlist.length;
    playVideo();
}

/* 🔄 REINTENTO SI FALLA */
function retryPlay() {
    retry++;
    if (retry < 3) {
        setTimeout(playVideo, 1000);
    } else {
        retry = 0;
        nextVideo();
    }
}

/* EVENTOS */
video.addEventListener("ended", nextVideo);
video.addEventListener("error", retryPlay);

/* SI SE QUEDA CARGANDO */
video.addEventListener("waiting", () => {
    setTimeout(() => {
        if (video.readyState < 3) {
            nextVideo();
        }
    }, 4000);
});

/* 🚀 INICIAR */
playVideo();

/* 🔊 AUDIO A 1 SEGUNDO SIN ROMPER */
setTimeout(() => {
    if (!video.paused) {
        video.muted = false;
        video.play().catch(()=>{});
    }
}, 1000);

/* 🔧 RESPALDO (CLICK) */
document.addEventListener("click", () => {
    video.muted = false;
    video.play();
}, { once: true });

</script>

</body>
</html>
