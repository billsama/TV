<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FlowIPTV Ultimate | Zero CORS Block</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Video.js -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.min.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <!-- HLS Support -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* Header */
        .header {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid rgba(255,0,0,0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .logo i {
            color: #ff0000;
            font-size: 1.8rem;
        }

        .badge {
            background: #ff0000;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }

        /* Browser Selector */
        .browser-selector {
            background: rgba(0,0,0,0.5);
            border-radius: 2rem;
            padding: 0.3rem;
            display: flex;
            gap: 0.3rem;
        }

        .browser-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 1.5rem;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }

        .browser-btn.active {
            background: #ff0000;
            color: white;
        }

        .browser-btn:hover {
            background: rgba(255,0,0,0.5);
        }

        /* Search Bar */
        .search-section {
            background: rgba(0,0,0,0.5);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .url-input-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .url-input-group input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 0.8rem 1rem;
            border-radius: 0.5rem;
            color: white;
            font-size: 0.9rem;
            font-family: monospace;
        }

        .url-input-group button {
            background: #ff0000;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 0.5rem;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .url-input-group button:hover {
            transform: scale(1.02);
            background: #cc0000;
        }

        /* Player */
        .player-container {
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .video-js {
            width: 100%;
            aspect-ratio: 16/9;
        }

        .player-controls {
            background: rgba(0,0,0,0.9);
            padding: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            border-top: 1px solid #ff0000;
        }

        /* Sidebar */
        .sidebar {
            background: rgba(0,0,0,0.5);
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.5rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .channel-card {
            background: rgba(30,30,30,0.8);
            border-radius: 0.5rem;
            padding: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .channel-card:hover {
            background: #ff0000;
            transform: translateX(5px);
        }

        /* Status Bar */
        .status-bar {
            background: rgba(0,0,0,0.5);
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.8rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff00;
            box-shadow: 0 0 5px #00ff00;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a1a;
            border-left: 3px solid #ff0000;
            padding: 0.8rem 1rem;
            border-radius: 0.5rem;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: none;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .app { padding: 0.5rem; }
            .header { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">
            <i class="fas fa-tv"></i>
            <span>FlowIPTV ULTIMATE</span>
            <span class="badge">ZERO CORS</span>
        </div>
        <div class="browser-selector" id="browserSelector">
            <button class="browser-btn active" data-browser="auto">🤖 AUTO</button>
            <button class="browser-btn" data-browser="chrome">🌐 CHROME</button>
            <button class="browser-btn" data-browser="firefox">🦊 FIREFOX</button>
            <button class="browser-btn" data-browser="safari">🍎 SAFARI</button>
            <button class="browser-btn" data-browser="edge">🌊 EDGE</button>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-indicator">
            <div class="led"></div>
            <span id="browserStatus">Detectando navegador...</span>
        </div>
        <div class="status-indicator">
            <i class="fas fa-shield-alt"></i>
            <span id="corsStatus">Modo Anti-CORS Activo</span>
        </div>
        <div class="status-indicator">
            <i class="fas fa-tachometer-alt"></i>
            <span id="streamStatus">Listo</span>
        </div>
    </div>

    <div class="search-section">
        <div class="url-input-group">
            <input type="text" id="urlInput" placeholder="🔗 Pega cualquier URL: M3U8 | MP4 | MP3 | Lista M3U | Radio Stream">
            <button id="playBtn"><i class="fas fa-play"></i> REPRODUCIR</button>
            <button id="parseBtn"><i class="fas fa-list"></i> CARGAR LISTA</button>
        </div>
    </div>

    <div class="player-container">
        <video id="videoPlayer" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
        <div class="player-controls">
            <div class="status-indicator">
                <i class="fas fa-info-circle"></i>
                <span id="currentTitle">Sin reproducción</span>
            </div>
            <div>
                <button id="stopBtn" class="ctrl-btn"><i class="fas fa-stop"></i></button>
                <button id="reloadBtn" class="ctrl-btn"><i class="fas fa-sync-alt"></i></button>
                <button id="fullscreenBtn" class="ctrl-btn"><i class="fas fa-expand"></i></button>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar" style="display: none;">
        <h3 style="margin-bottom: 1rem;"><i class="fas fa-list"></i> Lista de Reproducción</h3>
        <div class="channels-grid" id="channelsList"></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ==================== DETECCIÓN DE NAVEGADOR ====================
    function detectBrowser() {
        const userAgent = navigator.userAgent.toLowerCase();
        if (userAgent.includes('firefox')) return 'firefox';
        if (userAgent.includes('chrome') && !userAgent.includes('edg')) return 'chrome';
        if (userAgent.includes('safari') && !userAgent.includes('chrome')) return 'safari';
        if (userAgent.includes('edg')) return 'edge';
        return 'other';
    }

    let currentBrowser = detectBrowser();
    let videoPlayer = null;
    let currentUrl = null;
    let currentTitle = null;

    // ==================== ESTRATEGIAS POR NAVEGADOR ====================
    const BrowserStrategies = {
        firefox: {
            // Firefox es el más permisivo con CORS
            useProxy: false,
            useHLSjs: false,
            useBlob: false,
            customHeaders: true
        },
        chrome: {
            // Chrome necesita más ayuda
            useProxy: true,
            useHLSjs: true,
            useBlob: true,
            customHeaders: false
        },
        edge: {
            // Edge similar a Chrome
            useProxy: true,
            useHLSjs: true,
            useBlob: true,
            customHeaders: false
        },
        safari: {
            // Safari es el más restrictivo
            useProxy: true,
            useHLSjs: false, // Safari tiene soporte nativo
            useBlob: true,
            customHeaders: false
        },
        other: {
            useProxy: true,
            useHLSjs: true,
            useBlob: true,
            customHeaders: false
        }
    };

    // Proxies y CORS bypass
    const CORS_PROXIES = [
        'https://cors-anywhere.herokuapp.com/',
        'https://api.allorigins.win/raw?url=',
        'https://corsproxy.io/?',
        'https://proxy.cors.sh/',
        'https://cors.zirk.eu/'
    ];

    let currentStrategy = BrowserStrategies[currentBrowser] || BrowserStrategies.other;

    // Mostrar toast
    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
        toast.style.background = isError ? 'rgba(255,0,0,0.9)' : '#1a1a1a';
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => {
                toast.style.display = 'none';
                toast.style.opacity = '1';
            }, 500);
        }, 3000);
    }

    // Actualizar estado del navegador
    function updateBrowserStatus() {
        const browserNames = {
            firefox: '🦊 Firefox (Recomendado - Sin bloqueos)',
            chrome: '🌐 Chrome (Modo compatibilidad)',
            safari: '🍎 Safari (Modo seguro)',
            edge: '🌊 Edge (Modo compatibilidad)',
            other: '🤖 Navegador detectado'
        };
        document.getElementById('browserStatus').innerHTML = browserNames[currentBrowser] || 'Navegador detectado';
        
        // Consejos según navegador
        if (currentBrowser === 'firefox') {
            showToast('✅ Firefox detectado - Máxima compatibilidad CORS', false);
        } else if (currentBrowser === 'safari') {
            showToast('⚠️ Safari detectado - Activando modo especial', false);
        } else if (currentBrowser === 'chrome') {
            showToast('🌐 Chrome detectado - Usando optimizaciones anti-CORS', false);
        }
    }

    // ==================== REPRODUCCIÓN INTELIGENTE ====================
    async function playMedia(url, title = '') {
        const streamStatus = document.getElementById('streamStatus');
        streamStatus.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Conectando...';
        
        currentUrl = url;
        currentTitle = title;
        document.getElementById('currentTitle').innerHTML = title || truncateUrl(url);
        
        const isHLS = url.includes('.m3u8') || url.includes('m3u8');
        const isVideo = url.includes('.mp4') || url.includes('.mkv');
        const isAudio = url.includes('.mp3') || url.includes('.aac') || url.includes('radio');
        
        try {
            if (isHLS) {
                await playHLS(url, title);
            } else if (isAudio) {
                await playAudio(url, title);
            } else {
                await playVideo(url, title);
            }
            streamStatus.innerHTML = '<i class="fas fa-play"></i> Reproduciendo';
            showToast(`🎬 Reproduciendo: ${title || truncateUrl(url)}`, false);
        } catch (error) {
            console.error('Error:', error);
            streamStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error';
            showToast(`Error: ${error.message}`, true);
            // Intentar con fallback
            await fallbackPlay(url, title);
        }
    }

    // Reproducción HLS específica por navegador
    async function playHLS(url, title) {
        if (!videoPlayer) {
            initVideoPlayer();
        }
        
        let finalUrl = url;
        
        // Para Chrome/Edge, usar HLS.js para mejor compatibilidad
        if ((currentBrowser === 'chrome' || currentBrowser === 'edge') && window.Hls && Hls.isSupported()) {
            const hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                xhrSetup: function(xhr, url) {
                    // Configurar CORS
                    xhr.withCredentials = false;
                }
            });
            hls.loadSource(url);
            hls.attachMedia(videoPlayer.el());
            videoPlayer.hls = hls;
            videoPlayer.play().catch(e => console.log('Autoplay:', e));
        } 
        // Para Firefox y otros, usar video.js nativo
        else {
            videoPlayer.src({ src: url, type: 'application/x-mpegURL' });
            videoPlayer.load();
            videoPlayer.play().catch(e => console.log('Autoplay:', e));
        }
    }

    // Reproducción de video normal
    async function playVideo(url, title) {
        if (!videoPlayer) {
            initVideoPlayer();
        }
        
        let finalUrl = url;
        
        // Para Chrome/Edge, usar fetch + blob para evitar CORS
        if (currentStrategy.useBlob && (currentBrowser === 'chrome' || currentBrowser === 'edge')) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                finalUrl = URL.createObjectURL(blob);
            } catch(e) {
                console.log('Blob falló, usando URL directa');
            }
        }
        
        videoPlayer.src({ src: finalUrl, type: 'video/mp4' });
        videoPlayer.load();
        videoPlayer.play().catch(e => console.log('Autoplay:', e));
    }

    // Reproducción de audio
    async function playAudio(url, title) {
        const audio = new Audio();
        audio.controls = true;
        audio.autoplay = true;
        audio.style.width = '100%';
        
        let finalUrl = url;
        
        if (currentStrategy.useBlob) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                finalUrl = URL.createObjectURL(blob);
            } catch(e) {}
        }
        
        audio.src = finalUrl;
        
        // Mostrar reproductor de audio
        const playerContainer = document.querySelector('.player-container');
        const existingAudio = document.querySelector('.audio-player');
        if (existingAudio) existingAudio.remove();
        
        audio.className = 'audio-player';
        audio.style.marginTop = '1rem';
        playerContainer.appendChild(audio);
        
        document.getElementById('currentTitle').innerHTML = `🎵 ${title || truncateUrl(url)}`;
    }

    // Fallback con proxy
    async function fallbackPlay(url, title) {
        showToast('Intentando con proxy de respaldo...', false);
        
        for (let proxy of CORS_PROXIES) {
            try {
                const proxyUrl = proxy + encodeURIComponent(url);
                if (url.includes('.m3u8')) {
                    await playHLS(proxyUrl, title + ' (proxy)');
                    return;
                } else if (url.includes('.mp4')) {
                    await playVideo(proxyUrl, title + ' (proxy)');
                    return;
                }
            } catch(e) {
                console.log('Proxy falló:', proxy);
            }
        }
        
        throw new Error('No se pudo reproducir con ningún método');
    }

    // ==================== PARSE M3U ====================
    async function parseM3U(url) {
        showToast('Cargando lista de reproducción...', false);
        document.getElementById('streamStatus').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cargando lista...';
        
        try {
            let content;
            
            // Intentar fetch directo primero
            try {
                const response = await fetch(url);
                content = await response.text();
            } catch(e) {
                // Si falla, usar proxy
                for (let proxy of CORS_PROXIES) {
                    try {
                        const response = await fetch(proxy + encodeURIComponent(url));
                        content = await response.text();
                        break;
                    } catch(proxyError) {}
                }
            }
            
            if (!content) throw new Error('No se pudo cargar la lista');
            
            const channels = parseM3UText(content);
            if (channels.length === 0) throw new Error('No se encontraron canales');
            
            renderChannels(channels);
            document.getElementById('sidebar').style.display = 'block';
            showToast(`✅ ${channels.length} canales cargados`, false);
            document.getElementById('streamStatus').innerHTML = `<i class="fas fa-check"></i> ${channels.length} canales`;
            
        } catch(error) {
            showToast('Error al cargar lista: ' + error.message, true);
            document.getElementById('streamStatus').innerHTML = '<i class="fas fa-exclamation"></i> Error';
        }
    }

    function parseM3UText(content) {
        const lines = content.split(/\r?\n/);
        const channels = [];
        let currentChannel = null;
        
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                const match = line.match(/#EXTINF:.*?,(.*)$/);
                if (match) {
                    currentChannel = { name: match[1].trim() };
                }
            } else if (line && !line.startsWith('#') && currentChannel) {
                currentChannel.url = line;
                currentChannel.type = detectType(line);
                channels.push({ ...currentChannel });
                currentChannel = null;
            }
        }
        
        return channels;
    }

    function detectType(url) {
        if (url.includes('.m3u8')) return 'live';
        if (url.includes('.mp4')) return 'video';
        if (url.includes('radio') || url.includes('.mp3')) return 'audio';
        return 'stream';
    }

    function renderChannels(channels) {
        const container = document.getElementById('channelsList');
        container.innerHTML = '';
        
        channels.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            const icon = ch.type === 'live' ? 'fa-tv' : (ch.type === 'audio' ? 'fa-music' : 'fa-film');
            
            card.innerHTML = `
                <i class="fas ${icon}" style="font-size: 1.5rem;"></i>
                <div style="flex: 1;">
                    <div><strong>${escapeHtml(ch.name.substring(0, 50))}</strong></div>
                    <div style="font-size: 0.7rem; color: #aaa;">${ch.type.toUpperCase()}</div>
                </div>
                <i class="fas fa-play-circle" style="color: #ff0000;"></i>
            `;
            card.onclick = () => playMedia(ch.url, ch.name);
            container.appendChild(card);
        });
    }

    // ==================== VIDEO.JS INICIALIZACIÓN ====================
    function initVideoPlayer() {
        if (videoPlayer) {
            videoPlayer.dispose();
        }
        
        const videoElement = document.getElementById('videoPlayer');
        videoPlayer = videojs(videoElement, {
            controls: true,
            autoplay: true,
            preload: 'auto',
            fluid: true,
            playbackRates: [0.5, 0.75, 1, 1.25, 1.5, 2],
            controlBar: {
                pictureInPictureToggle: true,
                volumePanel: { inline: false }
            }
        });
        
        return videoPlayer;
    }

    // ==================== UTILIDADES ====================
    function truncateUrl(url, maxLen = 40) {
        return url.length > maxLen ? url.substring(0, maxLen) + '...' : url;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function stopAll() {
        if (videoPlayer) {
            videoPlayer.pause();
            videoPlayer.src('');
        }
        document.getElementById('currentTitle').innerHTML = 'Reproducción detenida';
        document.getElementById('streamStatus').innerHTML = 'Detenido';
        showToast('⏹️ Reproducción detenida', false);
    }

    function reloadCurrent() {
        if (currentUrl) {
            playMedia(currentUrl, currentTitle);
        } else {
            showToast('No hay stream activo', true);
        }
    }

    function goFullscreen() {
        const container = document.querySelector('.player-container');
        if (container.requestFullscreen) container.requestFullscreen();
        else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
    }

    function loadUrl() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) {
            showToast('Ingresa una URL válida', true);
            return;
        }
        
        if (url.endsWith('.m3u') || (url.includes('.m3u') && !url.endsWith('.m3u8'))) {
            parseM3U(url);
        } else {
            playMedia(url, 'Directo');
        }
    }

    // ==================== INICIALIZACIÓN ====================
    function init() {
        updateBrowserStatus();
        initVideoPlayer();
        
        // Event listeners
        document.getElementById('playBtn').onclick = loadUrl;
        document.getElementById('parseBtn').onclick = () => {
            const url = document.getElementById('urlInput').value.trim();
            if (url) parseM3U(url);
            else showToast('Ingresa URL de lista M3U', true);
        };
        document.getElementById('stopBtn').onclick = stopAll;
        document.getElementById('reloadBtn').onclick = reloadCurrent;
        document.getElementById('fullscreenBtn').onclick = goFullscreen;
        
        document.getElementById('urlInput').onkeypress = (e) => {
            if (e.key === 'Enter') loadUrl();
        };
        
        // Cambio de navegador manual
        document.querySelectorAll('.browser-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.browser-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentBrowser = btn.dataset.browser;
                currentStrategy = BrowserStrategies[currentBrowser] || BrowserStrategies.other;
                updateBrowserStatus();
                showToast(`Modo ${currentBrowser.toUpperCase()} activado`, false);
            };
        });
        
        console.log('✅ FlowIPTV Ultimate - Zero CORS Mode');
        console.log(`🔍 Navegador detectado: ${currentBrowser}`);
        console.log(`🛡️ Estrategia: ${JSON.stringify(currentStrategy)}`);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
</body>
</html>
