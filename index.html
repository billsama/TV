<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZymarGo Pro | FlowIPTV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.min.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <style>
        :root {
            --primary: #6c63ff;
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #ffffff;
            --accent: #00f2fe;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            overflow-x: hidden;
        }
        .container { display: flex; flex-direction: column; height: 100vh; }
        
        /* Header & Controls */
        .header {
            padding: 15px;
            background: #121212;
            border-bottom: 1px solid #333;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .input-group {
            flex: 1;
            display: flex;
            min-width: 300px;
            background: #252525;
            border-radius: 8px;
            padding: 5px;
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            outline: none;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; transform: scale(1.02); }
        .btn-secondary { background: #333; }

        /* Main Layout */
        .main-content { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* Sidebar */
        .sidebar {
            width: 350px;
            background: #121212;
            border-right: 1px solid #333;
            overflow-y: auto;
            transition: 0.3s;
            z-index: 100;
        }
        .channel-item {
            padding: 12px 15px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
        }
        .channel-item:hover { background: #1e1e1e; }
        .ch-icon { width: 40px; height: 40px; background: #252525; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--primary); }
        .ch-info { flex: 1; overflow: hidden; }
        .ch-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ch-url { font-size: 11px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Video Area */
        .video-container {
            flex: 1;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }
        .video-js { width: 100% !important; height: 100% !important; }

        .current-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            border-left: 4px solid var(--primary);
            z-index: 10;
        }

        @media (max-width: 768px) {
            .sidebar { position: absolute; left: -100%; height: 100%; width: 80%; }
            .sidebar.active { left: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button id="toggleMenu" class="btn-secondary"><i class="fas fa-bars"></i></button>
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="URL M3U8, Xtream o Directa...">
            <button id="playBtn"><i class="fas fa-play"></i></button>
        </div>
        <button id="parseBtn" class="btn-secondary">Cargar Lista</button>
        <button id="clearBtn" style="background:#e74c3c;"><i class="fas fa-trash"></i></button>
    </div>

    <div class="main-content">
        <div id="sidebar" class="sidebar">
            </div>
        
        <div class="video-container">
            <div id="currentLabel" class="current-info">ZymarGo Ready</div>
            <video id="main-player" class="video-js vjs-big-play-centered" controls preload="auto" crossorigin="anonymous">
                <p class="vjs-no-js">Para ver este video, habilita JavaScript.</p>
            </video>
        </div>
    </div>
</div>

<script>
    // ==================== CONFIGURACIÓN PROXY STEALTH ====================
    // Tu Worker de Cloudflare v4.0
    const ZYMARGO_PROXY = "https://cors-proxy-zymargo.billsama1996.workers.dev/?url=";

    // Función crítica para evadir bloqueos
    function getSafeUrl(originalUrl) {
        if (!originalUrl) return "";
        // Si la URL es HTTP o de un servidor externo, la pasamos por el Proxy Stealth
        if (originalUrl.startsWith("http")) {
            console.log("🛠️ Aplicando Proxy Stealth a:", originalUrl);
            return ZYMARGO_PROXY + encodeURIComponent(originalUrl);
        }
        return originalUrl;
    }

    // ==================== REPRODUCTOR ====================
    let player = videojs('main-player', {
        fluid: true,
        html5: { vhs: { overrideNative: true }, nativeAudioTracks: false, nativeVideoTracks: false }
    });

    const urlInput = document.getElementById('urlInput');
    const sidebar = document.getElementById('sidebar');
    const currentLabel = document.getElementById('currentLabel');

    // Cargar URL directa (botón Play)
    async function loadDirectUrl() {
        const url = urlInput.value.trim();
        if (!url) return;

        const proxiedUrl = getSafeUrl(url);
        const type = url.includes(".m3u8") ? 'application/x-mpegURL' : 'video/mp4';

        currentLabel.innerText = "📺 Cargando Stream...";
        
        player.src({ src: proxiedUrl, type: type });
        player.play().catch(e => console.error("Error al reproducir", e));
    }

    // Parsear Lista M3U
    async function parseM3u() {
        const url = urlInput.value.trim();
        if (!url) return;
        
        // Usamos el proxy para descargar la lista M3U y evitar bloqueo CORS al leer el archivo
        const proxiedListUrl = getSafeUrl(url);
        
        try {
            currentLabel.innerText = "📂 Descargando lista...";
            const response = await fetch(proxiedListUrl);
            const text = await response.text();
            
            const channels = [];
            const lines = text.split('\n');
            let currentName = "";

            lines.forEach(line => {
                if (line.startsWith('#EXTINF:')) {
                    currentName = line.split(',')[1] || "Canal sin nombre";
                } else if (line.startsWith('http')) {
                    channels.push({ name: currentName, url: line.trim() });
                }
            });

            renderSidebar(channels);
            currentLabel.innerText = `✅ ${channels.length} canales cargados`;
        } catch (e) {
            alert("Error al cargar la lista. Verifica el Proxy.");
        }
    }

    function renderSidebar(channels) {
        sidebar.innerHTML = "";
        channels.forEach(ch => {
            const item = document.createElement('div');
            item.className = 'channel-item';
            item.innerHTML = `
                <div class="ch-icon"><i class="fas fa-tv"></i></div>
                <div class="ch-info">
                    <div class="ch-name">${ch.name}</div>
                    <div class="ch-url">${ch.url}</div>
                </div>
            `;
            item.onclick = () => {
                const safeStreamUrl = getSafeUrl(ch.url);
                currentLabel.innerText = `📺 ${ch.name}`;
                player.src({ src: safeStreamUrl, type: 'application/x-mpegURL' });
                player.play();
                if (window.innerWidth < 768) sidebar.classList.remove('active');
            };
            sidebar.appendChild(item);
        });
    }

    // Eventos
    document.getElementById('playBtn').onclick = loadDirectUrl;
    document.getElementById('parseBtn').onclick = parseM3u;
    document.getElementById('clearBtn').onclick = () => { sidebar.innerHTML = ""; urlInput.value = ""; };
    document.getElementById('toggleMenu').onclick = () => sidebar.classList.toggle('active');

    console.log("🚀 ZymarGo Engine v4.0 con Proxy Inyectado listo.");
</script>

</body>
</html>
