<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    font-family: Arial, sans-serif;
}

/* 🎬 PLAYER */
.player-container {
    width: 100%;
    height: 100dvh;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 📢 MENSAJE SUPERIOR */
.banner {
    position: fixed;
    top: 0;
    width: 100%;
    text-align: center;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 12px;
    font-size: 14px;
    font-weight: bold;
    z-index: 999;
    backdrop-filter: blur(6px);
}
</style>
</head>

<body>

<!-- 📢 MENSAJE -->
<div class="banner">
Adquiere tu paquete premium y evita la publicidad
</div>

<!-- 🎬 PLAYER -->
<div class="player-container">
    <video id="video" autoplay muted playsinline></video>
</div>

<script>
const video = document.getElementById("video");

/* 🎬 PLAYLIST */
const playlist = [
"https://dl.dropboxusercontent.com/scl/fi/4zbtcy2zdg1upztjvw9ty/tv_Sjow.mp4?rlkey=fz4swcg4iul7kqlq0jdt7rajk",
"https://dl.dropboxusercontent.com/scl/fi/vlyjfym5lkq74j60vv3d7/wsdw.mp4?rlkey=cefh6u2imupuuxlnb3x8g17jt",
"https://dl.dropboxusercontent.com/scl/fi/1tgi7i2xjdfuoin8b9aw1/gag.mp4?rlkey=sqzfdxe5cphqt5a2z4pz5fjn6"
];

let retry = 0;
let lastIndex = -1;

/* 🎲 RANDOM */
function getRandomIndex() {
    let newIndex;
    do {
        newIndex = Math.floor(Math.random() * playlist.length);
    } while (newIndex === lastIndex && playlist.length > 1);

    lastIndex = newIndex;
    return newIndex;
}

/* ▶ PLAY */
function playVideo() {
    const index = getRandomIndex();
    video.src = playlist[index];
    video.load();

    video.play()
    .then(() => retry = 0)
    .catch(() => retryPlay());
}

/* 🔄 RETRY */
function retryPlay() {
    retry++;
    if (retry < 3) {
        setTimeout(playVideo, 1000);
    } else {
        retry = 0;
        playVideo();
    }
}

/* EVENTOS */
video.addEventListener("ended", playVideo);
video.addEventListener("error", retryPlay);

/* ⏳ SI SE TRABA */
video.addEventListener("waiting", () => {
    setTimeout(() => {
        if (video.readyState < 3) {
            playVideo();
        }
    }, 4000);
});

/* 🚀 START */
playVideo();

/* 🔊 AUDIO A 1 SEGUNDO */
setTimeout(() => {
    if (!video.paused) {
        video.muted = false;
        video.play().catch(()=>{});
    }
}, 1000);

/* 🔧 BACKUP CLICK */
document.addEventListener("click", () => {
    video.muted = false;
    video.play();
}, { once: true });
</script>

</body>
</html>
