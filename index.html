<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Player PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
}

/* 🎬 VIDEO */
.player-container {
    position: fixed;
    inset: 0;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 🔥 BANNER MEJORADO */
.banner {
    position: fixed;
    top: calc(10px + env(safe-area-inset-top));
    left: 10px;

    width: min(85vw, 300px);

    padding: 10px;
    border-radius: 12px;

    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(12px);

    color: #fff;
    font-size: 13px;
    line-height: 1.3;

    z-index: 999;
}

/* TITULO */
.banner span {
    color: #00ffae;
    font-weight: 700;
}

/* ITEMS */
.banner-item {
    display: block;
    margin-bottom: 4px;

    /* 🔑 CLAVE: evita desorden */
    word-break: break-word;
}

/* 📱 CELULAR */
@media (max-width: 600px) {
    .banner {
        font-size: 10px;
        padding: 8px;
        width: 80vw;
    }

    .banner-item {
        margin-bottom: 3px;
    }
}

/* 📱 MUY PEQUEÑO */
@media (max-width: 360px) {
    .banner {
        font-size: 9px;
    }
}

/* 💻 PC */
@media (min-width: 1024px) {
    .banner {
        font-size: 14px;
        width: 320px;
        top: 20px;
        left: 20px;
    }
}
</style>
</head>

<body>

<div class="banner">
    <div class="banner-item">🚀 <span>IPTV Premium</span> estable sin cortes</div>
    <div class="banner-item">• Ventas de Software Web • TV Box • Antivirus • Cuentas multiplataformas • Otros </div>
    <div class="banner-item">WhatsApp: 935-719-978</div>
</div>

<div class="player-container">
    <video id="video" autoplay muted playsinline></video>
</div>

<script>
const video = document.getElementById("video");

const playlist = [
"https://dl.dropboxusercontent.com/scl/fi/4zbtcy2zdg1upztjvw9ty/tv_Sjow.mp4?rlkey=fz4swcg4iul7kqlq0jdt7rajk",
"https://dl.dropboxusercontent.com/scl/fi/vlyjfym5lkq74j60vv3d7/wsdw.mp4?rlkey=cefh6u2imupuuxlnb3x8g17jt",
"https://dl.dropboxusercontent.com/scl/fi/1tgi7i2xjdfuoin8b9aw1/gag.mp4?rlkey=sqzfdxe5cphqt5a2z4pz5fjn6",
"https://dl.dropboxusercontent.com/scl/fi/6v7230f6drvhrxaxc8282/scdddg.mp4?rlkey=4uf552fthex3e93i28br4t7cd",
"https://dl.dropboxusercontent.com/scl/fi/c4rifovakuhmbvds9ybq2/scdvdv.mp4?rlkey=erq3a307ywolnyev6qd8wpkjk",
"https://dl.dropboxusercontent.com/scl/fi/wcktveyjs0rmuvz28z01t/QUIIZTOK.mp4?rlkey=liizv1alk9yzi06ecrxlo533n",
"https://dl.dropboxusercontent.com/scl/fi/hy6kvjz8knjkxx2noln0f/ZYMARGO.mp4?rlkey=jo4avkoosl2k90prudf7ft6ae"
];

let shuffled = [];
let current = 0;

function shufflePlaylist() {
    shuffled = [...playlist]
        .map(v => ({ v, r: Math.random() }))
        .sort((a,b) => a.r - b.r)
        .map(x => x.v);

    current = 0;
}

function playVideo() {
    if (current >= shuffled.length) shufflePlaylist();

    video.src = shuffled[current];
    video.load();

    video.play().catch(() => {
        setTimeout(playVideo, 1000);
    });

    current++;
}

video.addEventListener("ended", playVideo);
video.addEventListener("error", playVideo);

shufflePlaylist();
playVideo();

setTimeout(() => {
    video.muted = false;
    video.volume = 1;
    video.play().catch(()=>{});
}, 1000);

document.addEventListener("click", () => {
    video.muted = false;
    video.play();
}, { once: true });
</script>

</body>
</html>
