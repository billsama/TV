<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
}

/* VIDEO FULL */
.player-container {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 🔥 BANNER PRO RESPONSIVE */
.banner {
    position: fixed;
    top: calc(10px + env(safe-area-inset-top));
    left: 10px;

    max-width: min(90vw, 320px);

    padding: 10px 12px;
    border-radius: 14px;

    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    color: #fff;

    font-size: clamp(11px, 1.6vw, 15px);
    line-height: 1.4;

    z-index: 999;

    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}

/* TITULO */
.banner span {
    color: #00ffae;
    font-weight: 800;
    font-size: clamp(12px, 1.8vw, 16px);
}

/* ITEMS */
.banner-item {
    display: block;
    margin-bottom: 4px;
    opacity: 0.95;
}

/* WhatsApp destacado */
.banner-item:last-child {
    font-weight: 700;
    letter-spacing: 0.3px;
}

/* 📱 MOBILE EXTRA PEQUEÑO */
@media (max-width: 360px) {
    .banner {
        padding: 8px 10px;
        border-radius: 12px;
    }
}

/* 💻 PC */
@media (min-width: 1024px) {
    .banner {
        top: 20px;
        left: 20px;
        max-width: 360px;
    }
}
</style>
