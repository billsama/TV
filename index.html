<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FlowIPTV Ultra | Xtream · M3U8 · Video · Audio · Radio</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Video.js Core -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.min.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <!-- HLS.js para HLS universal -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- DASH.js para MPEG-DASH -->
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <!-- Shaka Player para soporte adicional -->
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.0/dist/shaka-player.compiled.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #0f0f0f 100%);
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
        }

        .app {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* Header */
        .header {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid rgba(255,0,0,0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .logo i {
            color: #ff0000;
            font-size: 1.8rem;
        }

        .badge {
            background: #ff0000;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* Search Bar */
        .search-section {
            background: rgba(0,0,0,0.5);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .url-input-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .url-input-group input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 0.9rem 1rem;
            border-radius: 0.5rem;
            color: white;
            font-size: 0.9rem;
            font-family: monospace;
        }

        .url-input-group input:focus {
            outline: none;
            border-color: #ff0000;
        }

        .url-input-group button {
            background: #ff0000;
            border: none;
            padding: 0.9rem 1.5rem;
            border-radius: 0.5rem;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .url-input-group button:hover {
            transform: scale(1.02);
            background: #cc0000;
        }

        /* Tabs para Xtream */
        .xtream-tabs {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .xtream-tab {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }

        .xtream-tab.active {
            background: #ff0000;
        }

        .xtream-panel {
            background: rgba(0,0,0,0.5);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-top: 0.5rem;
            display: none;
        }

        .xtream-panel.active {
            display: block;
        }

        .xtream-input {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }

        .xtream-input input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 0.7rem;
            border-radius: 0.5rem;
            color: white;
        }

        /* Player Container */
        .player-container {
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
            margin-bottom: 1rem;
            position: relative;
        }

        .video-js {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }

        .player-controls {
            background: rgba(0,0,0,0.9);
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            border-top: 1px solid #ff0000;
        }

        /* Status Bar */
        .status-bar {
            background: rgba(0,0,0,0.5);
            border-radius: 0.5rem;
            padding: 0.6rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.75rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff00;
            box-shadow: 0 0 5px #00ff00;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Sidebar */
        .sidebar {
            background: rgba(0,0,0,0.5);
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.5rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .channel-card {
            background: rgba(30,30,30,0.9);
            border-radius: 0.5rem;
            padding: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .channel-card:hover {
            background: #ff0000;
            transform: translateX(5px);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a1a;
            border-left: 3px solid #ff0000;
            padding: 0.8rem 1rem;
            border-radius: 0.5rem;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: none;
            max-width: 350px;
            font-size: 0.85rem;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .app { padding: 0.5rem; }
            .header { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">
            <i class="fas fa-tv"></i>
            <span>FlowIPTV ULTRA</span>
            <span class="badge">XTREAM · HLS · VIDEO · RADIO</span>
        </div>
        <div class="format-selector">
            <span style="background: rgba(255,0,0,0.3); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.7rem;">
                <i class="fas fa-check-circle"></i> Todo en uno
            </span>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-indicator">
            <div class="led"></div>
            <span id="playerStatus">Listo</span>
        </div>
        <div class="status-indicator">
            <i class="fas fa-microchip"></i>
            <span id="formatDetected">Formato: ---</span>
        </div>
        <div class="status-indicator">
            <i class="fas fa-play-circle"></i>
            <span id="streamInfo">Esperando URL</span>
        </div>
    </div>

    <div class="search-section">
        <div class="url-input-group">
            <input type="text" id="urlInput" placeholder="🔗 Pega cualquier URL: Xtream | M3U8 | MP4 | MP3 | Radio | Lista M3U">
            <button id="playBtn"><i class="fas fa-play"></i> REPRODUCIR</button>
            <button id="parseBtn"><i class="fas fa-list"></i> CARGAR LISTA</button>
        </div>

        <!-- Panel Xtream Codes -->
        <div class="xtream-tabs">
            <button class="xtream-tab active" data-tab="url">📡 URL Directa</button>
            <button class="xtream-tab" data-tab="xtream">🔑 Xtream Codes</button>
        </div>

        <div id="xtreamPanel" class="xtream-panel">
            <div class="xtream-input">
                <input type="text" id="xtreamServer" placeholder="Servidor (ej: http://ejemplo.com:8080)">
                <input type="text" id="xtreamUser" placeholder="Usuario">
                <input type="text" id="xtreamPass" placeholder="Contraseña">
                <button id="xtreamConnectBtn" style="background: #ff0000;">Conectar</button>
            </div>
            <div id="xtreamCategories" style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem;"></div>
        </div>
    </div>

    <div class="player-container">
        <video id="videoPlayer" class="video-js vjs-big-play-centered" controls preload="auto" playsinline crossorigin="anonymous"></video>
        <div class="player-controls">
            <div class="status-indicator">
                <i class="fas fa-info-circle"></i>
                <span id="currentTitle">Sin reproducción</span>
            </div>
            <div>
                <button id="stopBtn" style="background: #333; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer;"><i class="fas fa-stop"></i></button>
                <button id="reloadBtn" style="background: #333; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer;"><i class="fas fa-sync-alt"></i></button>
                <button id="fullscreenBtn" style="background: #333; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer;"><i class="fas fa-expand"></i></button>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar" style="display: none;">
        <h3 style="margin-bottom: 1rem;"><i class="fas fa-list"></i> Lista de Reproducción</h3>
        <div class="channels-grid" id="channelsList"></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ==================== CONFIGURACIÓN COMPLETA ====================
    let videoPlayer = null;
    let currentUrl = null;
    let currentTitle = null;
    let hlsInstance = null;
    let dashInstance = null;
    let shakaPlayer = null;
    let currentEngine = null;

    // Proxies para CORS
    const PROXIES = [
        'https://cors-anywhere.herokuapp.com/',
        'https://api.allorigins.win/raw?url=',
        'https://corsproxy.io/?',
        'https://proxy.cors.sh/'
    ];

    // ==================== DETECCIÓN DE FORMATO ====================
    function detectFormat(url) {
        const urlLower = url.toLowerCase();
        
        // Xtream Codes
        if (urlLower.includes('get.php') || (urlLower.includes('username=') && urlLower.includes('password='))) {
            return { type: 'xtream', mime: 'xtream', icon: 'fa-key', name: 'XTREAM CODES' };
        }
        // HLS / M3U8
        if (urlLower.includes('.m3u8') || urlLower.includes('m3u8')) {
            return { type: 'hls', mime: 'application/x-mpegURL', icon: 'fa-tv', name: 'HLS STREAM' };
        }
        // MP4 Video
        if (urlLower.includes('.mp4') || urlLower.includes('.mkv') || urlLower.includes('.mov')) {
            return { type: 'mp4', mime: 'video/mp4', icon: 'fa-film', name: 'MP4 VIDEO' };
        }
        // Audio / Radio
        if (urlLower.includes('.mp3') || urlLower.includes('.aac') || urlLower.includes('.ogg') || 
            urlLower.includes('radio') || urlLower.includes(':8000') || urlLower.includes('/stream')) {
            return { type: 'audio', mime: 'audio/mpeg', icon: 'fa-music', name: 'RADIO / AUDIO' };
        }
        // Transport Stream
        if (urlLower.includes('.ts')) {
            return { type: 'ts', mime: 'video/MP2T', icon: 'fa-play', name: 'TS STREAM' };
        }
        // Lista M3U
        if (urlLower.includes('.m3u') && !urlLower.includes('.m3u8')) {
            return { type: 'playlist', mime: 'text/plain', icon: 'fa-list', name: 'PLAYLIST M3U' };
        }
        return { type: 'unknown', mime: 'video/mp4', icon: 'fa-question', name: 'FORMATO AUTO' };
    }

    // ==================== REPRODUCCIÓN UNIVERSAL ====================
    async function playUniversal(url, title = '') {
        const playerStatus = document.getElementById('playerStatus');
        const formatDetected = document.getElementById('formatDetected');
        const streamInfo = document.getElementById('streamInfo');
        
        currentUrl = url;
        currentTitle = title;
        
        const format = detectFormat(url);
        formatDetected.innerHTML = `<i class="fas ${format.icon}"></i> ${format.name}`;
        streamInfo.innerHTML = `Conectando...`;
        playerStatus.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Cargando`;
        
        document.getElementById('currentTitle').innerHTML = title || truncateUrl(url);
        
        // Limpiar instancias anteriores
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        if (dashInstance) { dashInstance.reset(); dashInstance = null; }
        if (shakaPlayer) { shakaPlayer.destroy(); shakaPlayer = null; }
        
        try {
            let success = false;
            
            // Intentar con el motor apropiado según formato
            switch(format.type) {
                case 'xtream':
                    success = await playXtream(url, title);
                    break;
                case 'hls':
                    success = await playHLS(url, title);
                    break;
                case 'mp4':
                    success = await playMP4(url, title);
                    break;
                case 'audio':
                    success = await playAudio(url, title);
                    break;
                case 'ts':
                    success = await playTS(url, title);
                    break;
                default:
                    success = await playAuto(url, title);
            }
            
            if (success) {
                playerStatus.innerHTML = `<i class="fas fa-play"></i> Reproduciendo`;
                streamInfo.innerHTML = `Stream activo`;
                showToast(`🎬 ${title || truncateUrl(url)}`, false);
            } else {
                throw new Error('No se pudo reproducir');
            }
            
        } catch(error) {
            console.error('Error:', error);
            playerStatus.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Error`;
            streamInfo.innerHTML = `Error: ${error.message}`;
            showToast(`Error: ${error.message}`, true);
            
            // Intentar con proxy
            await tryWithProxy(url, title);
        }
    }

    // ==================== XTREAM CODES ====================
    async function playXtream(url, title) {
        return new Promise(async (resolve, reject) => {
            try {
                if (!videoPlayer) initVideoPlayer();
                
                // Parsear URL Xtream
                const urlObj = new URL(url);
                const params = new URLSearchParams(urlObj.search);
                const username = params.get('username');
                const password = params.get('password');
                const server = `${urlObj.protocol}//${urlObj.hostname}:${urlObj.port || 80}`;
                
                // Obtener stream
                const streamUrl = `${server}/live/${username}/${password}/0.m3u8`;
                
                // Intentar reproducir como HLS
                const success = await playHLS(streamUrl, title);
                if (success) resolve(true);
                else reject(new Error('Xtream no disponible'));
                
            } catch(e) {
                reject(e);
            }
        });
    }

    // ==================== HLS CON MÚLTIPLES MOTORES ====================
    async function playHLS(url, title) {
        return new Promise((resolve, reject) => {
            if (!videoPlayer) initVideoPlayer();
            
            // Motor 1: HLS.js (Chrome, Edge, Firefox)
            if (Hls && Hls.isSupported()) {
                const hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    maxBufferLength: 30,
                    manifestLoadingTimeOut: 15000,
                    levelLoadingTimeOut: 15000,
                    xhrSetup: (xhr, url) => { xhr.withCredentials = false; }
                });
                
                hls.loadSource(url);
                hls.attachMedia(videoPlayer.el());
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    videoPlayer.play().catch(e => console.log('Autoplay:', e));
                    hlsInstance = hls;
                    resolve(true);
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) reject(new Error('HLS Error'));
                });
            }
            // Motor 2: Native HLS (Safari, iOS)
            else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                videoPlayer.src({ src: url, type: 'application/x-mpegURL' });
                videoPlayer.load();
                videoPlayer.play().catch(e => console.log('Autoplay:', e));
                resolve(true);
            }
            // Motor 3: Shaka Player
            else if (shaka && shaka.Player) {
                shakaPlayer = new shaka.Player(videoPlayer.el());
                shakaPlayer.load(url).then(() => {
                    resolve(true);
                }).catch(reject);
            }
            else {
                reject(new Error('HLS no soportado'));
            }
        });
    }

    // ==================== MP4 ====================
    async function playMP4(url, title) {
        return new Promise((resolve, reject) => {
            if (!videoPlayer) initVideoPlayer();
            
            videoPlayer.src({ src: url, type: 'video/mp4' });
            videoPlayer.load();
            
            const playPromise = videoPlayer.play();
            if (playPromise) {
                playPromise.then(() => resolve(true)).catch(reject);
            } else {
                resolve(true);
            }
        });
    }

    // ==================== AUDIO / RADIO ====================
    async function playAudio(url, title) {
        return new Promise((resolve, reject) => {
            const audio = new Audio();
            audio.src = url;
            audio.load();
            
            const playPromise = audio.play();
            if (playPromise) {
                playPromise.then(() => {
                    audio.controls = true;
                    audio.style.width = '100%';
                    audio.style.marginTop = '1rem';
                    audio.className = 'audio-player';
                    
                    const playerContainer = document.querySelector('.player-container');
                    const existing = document.querySelector('.audio-player');
                    if (existing) existing.remove();
                    playerContainer.appendChild(audio);
                    
                    resolve(true);
                }).catch(reject);
            } else {
                resolve(true);
            }
        });
    }

    // ==================== TS STREAM ====================
    async function playTS(url, title) {
        return playMP4(url, title);
    }

    // ==================== AUTO DETECT ====================
    async function playAuto(url, title) {
        // Intentar con MP4 primero
        try {
            return await playMP4(url, title);
        } catch(e) {
            // Luego con HLS
            try {
                return await playHLS(url, title);
            } catch(e2) {
                // Finalmente con audio
                return await playAudio(url, title);
            }
        }
    }

    // ==================== PROXY FALLBACK ====================
    async function tryWithProxy(url, title) {
        for (let proxy of PROXIES) {
            try {
                const proxyUrl = proxy + encodeURIComponent(url);
                showToast(`Intentando proxy: ${proxy.split('//')[1]}`, false);
                await playUniversal(proxyUrl, title + ' (proxy)');
                return;
            } catch(e) {}
        }
        showToast('Todos los métodos fallaron', true);
    }

    // ==================== VIDEO.JS ====================
    function initVideoPlayer() {
        if (videoPlayer) {
            try { videoPlayer.dispose(); } catch(e) {}
        }
        
        const videoElement = document.getElementById('videoPlayer');
        videoPlayer = videojs(videoElement, {
            controls: true,
            autoplay: true,
            preload: 'auto',
            fluid: true,
            playbackRates: [0.5, 0.75, 1, 1.25, 1.5, 2],
            controlBar: {
                pictureInPictureToggle: true,
                volumePanel: { inline: false }
            }
        });
        
        return videoPlayer;
    }

    // ==================== XTREAM CODES CONEXIÓN ====================
    async function connectXtream() {
        const server = document.getElementById('xtreamServer').value.trim();
        const username = document.getElementById('xtreamUser').value.trim();
        const password = document.getElementById('xtreamPass').value.trim();
        
        if (!server || !username || !password) {
            showToast('Completa todos los campos', true);
            return;
        }
        
        showToast('Conectando a Xtream...', false);
        
        try {
            // Construir URL de API
            const apiUrl = `${server}/player_api.php?username=${username}&password=${password}`;
            const response = await fetch(apiUrl);
            const data = await response.json();
            
            if (data.user_info) {
                showToast(`✅ Conectado como: ${data.user_info.username}`, false);
                await loadXtreamCategories(server, username, password, data);
            } else {
                throw new Error('Credenciales inválidas');
            }
        } catch(error) {
            showToast('Error de conexión Xtream: ' + error.message, true);
        }
    }

    async function loadXtreamCategories(server, username, password, data) {
        const categoriesDiv = document.getElementById('xtreamCategories');
        categoriesDiv.innerHTML = '';
        
        // Cargar categorías de live TV
        const liveUrl = `${server}/player_api.php?username=${username}&password=${password}&action=get_live_categories`;
        const liveResponse = await fetch(liveUrl);
        const categories = await liveResponse.json();
        
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.textContent = cat.category_name;
            btn.style.background = 'rgba(255,255,255,0.2)';
            btn.style.border = 'none';
            btn.style.padding = '0.4rem 0.8rem';
            btn.style.borderRadius = '20px';
            btn.style.cursor = 'pointer';
            btn.onclick = () => loadXtreamChannels(server, username, password, cat.category_id, cat.category_name);
            categoriesDiv.appendChild(btn);
        });
        
        showToast(`${categories.length} categorías cargadas`, false);
    }

    async function loadXtreamChannels(server, username, password, categoryId, categoryName) {
        showToast(`Cargando canales de ${categoryName}...`, false);
        
        const channelsUrl = `${server}/player_api.php?username=${username}&password=${password}&action=get_live_streams&category_id=${categoryId}`;
        const response = await fetch(channelsUrl);
        const channels = await response.json();
        
        const channelsList = channels.map(ch => ({
            name: ch.name,
            url: `${server}/live/${username}/${password}/${ch.stream_id}.m3u8`,
            type: 'live',
            icon: 'fa-tv'
        }));
        
        renderChannels(channelsList);
        document.getElementById('sidebar').style.display = 'block';
        showToast(`${channels.length} canales de ${categoryName}`, false);
    }

    // ==================== PARSE M3U ====================
    async function parseM3U(url) {
        showToast('Cargando lista...', false);
        
        try {
            let content = null;
            
            try {
                const response = await fetch(url);
                if (response.ok) content = await response.text();
            } catch(e) {}
            
            if (!content) {
                for (let proxy of PROXIES) {
                    try {
                        const response = await fetch(proxy + encodeURIComponent(url));
                        if (response.ok) {
                            content = await response.text();
                            break;
                        }
                    } catch(e) {}
                }
            }
            
            if (!content) throw new Error('No se pudo cargar');
            
            const channels = parseM3UText(content);
            renderChannels(channels);
            document.getElementById('sidebar').style.display = 'block';
            showToast(`${channels.length} canales cargados`, false);
            
        } catch(error) {
            showToast('Error: ' + error.message, true);
        }
    }

    function parseM3UText(content) {
        const lines = content.split(/\r?\n/);
        const channels = [];
        let current = null;
        
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                const match = line.match(/#EXTINF:.*?,(.*)$/);
                if (match) current = { name: match[1].trim() };
            } else if (line && !line.startsWith('#') && current) {
                current.url = line;
                const format = detectFormat(line);
                current.type = format.type;
                current.icon = format.icon;
                channels.push({ ...current });
                current = null;
            }
        }
        
        return channels;
    }

    function renderChannels(channels) {
        const container = document.getElementById('channelsList');
        container.innerHTML = '';
        
        channels.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            const format = detectFormat(ch.url);
            
            card.innerHTML = `
                <i class="fas ${format.icon}" style="font-size: 1.3rem;"></i>
                <div style="flex: 1;">
                    <div><strong>${escapeHtml(ch.name.substring(0, 45))}</strong></div>
                    <div style="font-size: 0.65rem; color: #aaa;">${format.name}</div>
                </div>
                <i class="fas fa-play-circle" style="color: #ff0000;"></i>
            `;
            card.onclick = () => playUniversal(ch.url, ch.name);
            container.appendChild(card);
        });
    }

    // ==================== UTILIDADES ====================
    function truncateUrl(url, maxLen = 45) {
        return url.length > maxLen ? url.substring(0, maxLen) + '...' : url;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
        toast.style.background = isError ? 'rgba(255,0,0,0.9)' : '#1a1a1a';
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => {
                toast.style.display = 'none';
                toast.style.opacity = '1';
            }, 500);
        }, 4000);
    }

    function stopAll() {
        if (videoPlayer) videoPlayer.pause();
        if (hlsInstance) hlsInstance.destroy();
        if (shakaPlayer) shakaPlayer.destroy();
        document.getElementById('currentTitle').innerHTML = 'Detenido';
        showToast('⏹️ Detenido', false);
    }

    function reloadCurrent() {
        if (currentUrl) playUniversal(currentUrl, currentTitle);
        else showToast('No hay stream activo', true);
    }

    function goFullscreen() {
        const container = document.querySelector('.player-container');
        if (container.requestFullscreen) container.requestFullscreen();
        else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
    }

    function loadUrl() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) { showToast('Ingresa una URL', true); return; }
        
        const format = detectFormat(url);
        if (format.type === 'playlist') parseM3U(url);
        else playUniversal(url, 'Directo');
    }

    // ==================== TABS ====================
    function initTabs() {
        document.querySelectorAll('.xtream-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.xtream-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const panel = document.getElementById('xtreamPanel');
                if (tab.dataset.tab === 'xtream') {
                    panel.classList.add('active');
                } else {
                    panel.classList.remove('active');
                }
            };
        });
    }

    // ==================== INICIALIZACIÓN ====================
    function init() {
        initVideoPlayer();
        initTabs();
        
        document.getElementById('playBtn').onclick = loadUrl;
        document.getElementById('parseBtn').onclick = () => {
            const url = document.getElementById('urlInput').value.trim();
            if (url) parseM3U(url);
            else showToast('Ingresa URL de lista', true);
        };
        document.getElementById('xtreamConnectBtn').onclick = connectXtream;
        document.getElementById('stopBtn').onclick = stopAll;
        document.getElementById('reloadBtn').onclick = reloadCurrent;
        document.getElementById('fullscreenBtn').onclick = goFullscreen;
        
        document.getElementById('urlInput').onkeypress = (e) => {
            if (e.key === 'Enter') loadUrl();
        };
        
        console.log('✅ FlowIPTV ULTRA - Todo en uno');
        showToast('🎬 Listo! Soporta Xtream, M3U8, Video, Audio, Radio', false);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
</body>
</html>
