<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FlowIPTV Pro | Universal Player - Todos los Formatos</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Video.js + Plugins -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.min.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <!-- HLS.js para soporte universal de m3u8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- DASH.js para soporte MPEG-DASH -->
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* Header */
        .header {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid rgba(255,0,0,0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .logo i {
            color: #ff0000;
            font-size: 1.8rem;
        }

        .badge {
            background: #ff0000;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }

        /* Format Selector */
        .format-selector {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .format-badge {
            background: rgba(255,255,255,0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-family: monospace;
        }

        /* Search Bar */
        .search-section {
            background: rgba(0,0,0,0.5);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .url-input-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .url-input-group input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 0.8rem 1rem;
            border-radius: 0.5rem;
            color: white;
            font-size: 0.9rem;
            font-family: monospace;
        }

        .url-input-group button {
            background: #ff0000;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 0.5rem;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .url-input-group button:hover {
            transform: scale(1.02);
            background: #cc0000;
        }

        /* Player Container */
        .player-container {
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .video-js {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }

        .player-controls {
            background: rgba(0,0,0,0.9);
            padding: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            border-top: 1px solid #ff0000;
        }

        /* Error Info */
        .error-info {
            background: rgba(255,0,0,0.2);
            border-left: 3px solid #ff0000;
            padding: 0.8rem;
            margin-top: 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            display: none;
        }

        /* Sidebar */
        .sidebar {
            background: rgba(0,0,0,0.5);
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.5rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .channel-card {
            background: rgba(30,30,30,0.8);
            border-radius: 0.5rem;
            padding: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .channel-card:hover {
            background: #ff0000;
            transform: translateX(5px);
        }

        /* Status Bar */
        .status-bar {
            background: rgba(0,0,0,0.5);
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.8rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff00;
            box-shadow: 0 0 5px #00ff00;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a1a;
            border-left: 3px solid #ff0000;
            padding: 0.8rem 1rem;
            border-radius: 0.5rem;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: none;
            max-width: 350px;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .app { padding: 0.5rem; }
            .header { flex-direction: column; }
            .toast { max-width: 90%; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">
            <i class="fas fa-tv"></i>
            <span>FlowIPTV PRO</span>
            <span class="badge">UNIVERSAL</span>
        </div>
        <div class="format-selector">
            <span class="format-badge"><i class="fas fa-play"></i> HLS/M3U8</span>
            <span class="format-badge"><i class="fas fa-film"></i> MP4/MKV</span>
            <span class="format-badge"><i class="fas fa-music"></i> MP3/AAC</span>
            <span class="format-badge"><i class="fas fa-list"></i> M3U/XTREAM</span>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-indicator">
            <div class="led"></div>
            <span id="playerStatus">Listo</span>
        </div>
        <div class="status-indicator">
            <i class="fas fa-microchip"></i>
            <span id="formatDetected">Formato: ---</span>
        </div>
        <div class="status-indicator">
            <i class="fas fa-tachometer-alt"></i>
            <span id="streamInfo">Esperando URL</span>
        </div>
    </div>

    <div class="search-section">
        <div class="url-input-group">
            <input type="text" id="urlInput" placeholder="🔗 Pega cualquier URL: .m3u8 | .mp4 | .mp3 | lista.m3u | stream">
            <button id="playBtn"><i class="fas fa-play"></i> REPRODUCIR</button>
            <button id="parseBtn"><i class="fas fa-list"></i> CARGAR LISTA</button>
            <button id="testBtn" style="background: #444;"><i class="fas fa-vial"></i> TEST</button>
        </div>
    </div>

    <div class="player-container">
        <video id="videoPlayer" class="video-js vjs-big-play-centered" controls preload="auto" playsinline crossorigin="anonymous"></video>
        <div class="player-controls">
            <div class="status-indicator">
                <i class="fas fa-info-circle"></i>
                <span id="currentTitle">Sin reproducción</span>
            </div>
            <div>
                <button id="stopBtn" class="ctrl-btn" style="background: #333; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer;"><i class="fas fa-stop"></i></button>
                <button id="reloadBtn" class="ctrl-btn" style="background: #333; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer;"><i class="fas fa-sync-alt"></i></button>
                <button id="fullscreenBtn" class="ctrl-btn" style="background: #333; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer;"><i class="fas fa-expand"></i></button>
            </div>
        </div>
    </div>

    <div class="error-info" id="errorInfo">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="errorMessage"></span>
    </div>

    <div class="sidebar" id="sidebar" style="display: none;">
        <h3 style="margin-bottom: 1rem;"><i class="fas fa-list"></i> Lista de Reproducción</h3>
        <div class="channels-grid" id="channelsList"></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ==================== CONFIGURACIÓN UNIVERSAL ====================
    let videoPlayer = null;
    let currentUrl = null;
    let currentTitle = null;
    let hlsInstance = null;
    let dashInstance = null;
    let currentRetryCount = 0;
    const MAX_RETRIES = 3;

    // Proxies para fallback
    const PROXIES = [
        'https://cors-anywhere.herokuapp.com/',
        'https://api.allorigins.win/raw?url=',
        'https://corsproxy.io/?',
        'https://proxy.cors.sh/'
    ];

    // ==================== DETECCIÓN DE FORMATO ====================
    function detectFormat(url) {
        const urlLower = url.toLowerCase();
        
        if (urlLower.includes('.m3u8') || urlLower.includes('m3u8')) {
            return { type: 'hls', mime: 'application/x-mpegURL', icon: 'fa-tv', name: 'HLS Live Stream' };
        }
        if (urlLower.includes('.mpd') || urlLower.includes('dash')) {
            return { type: 'dash', mime: 'application/dash+xml', icon: 'fa-chart-line', name: 'MPEG-DASH' };
        }
        if (urlLower.includes('.mp4') || urlLower.includes('.mkv') || urlLower.includes('.mov') || urlLower.includes('.avi')) {
            return { type: 'mp4', mime: 'video/mp4', icon: 'fa-film', name: 'MP4 Video' };
        }
        if (urlLower.includes('.mp3') || urlLower.includes('.aac') || urlLower.includes('.ogg') || urlLower.includes('radio')) {
            return { type: 'audio', mime: 'audio/mpeg', icon: 'fa-music', name: 'Audio Stream' };
        }
        if (urlLower.includes('.ts') || urlLower.includes('stream')) {
            return { type: 'ts', mime: 'video/MP2T', icon: 'fa-play', name: 'Transport Stream' };
        }
        if (urlLower.includes('.m3u') && !urlLower.includes('.m3u8')) {
            return { type: 'playlist', mime: 'text/plain', icon: 'fa-list', name: 'Playlist M3U' };
        }
        return { type: 'unknown', mime: 'video/mp4', icon: 'fa-question', name: 'Formato desconocido' };
    }

    // ==================== REPRODUCCIÓN UNIVERSAL ====================
    async function playUniversal(url, title = '') {
        const playerStatus = document.getElementById('playerStatus');
        const formatDetected = document.getElementById('formatDetected');
        const streamInfo = document.getElementById('streamInfo');
        const errorInfo = document.getElementById('errorInfo');
        
        currentUrl = url;
        currentTitle = title;
        
        // Detectar formato
        const format = detectFormat(url);
        formatDetected.innerHTML = `<i class="fas ${format.icon}"></i> ${format.name}`;
        streamInfo.innerHTML = `Conectando...`;
        playerStatus.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Cargando`;
        errorInfo.style.display = 'none';
        
        // Limpiar instancias anteriores
        if (hlsInstance) {
            hlsInstance.destroy();
            hlsInstance = null;
        }
        if (dashInstance) {
            dashInstance.reset();
            dashInstance = null;
        }
        
        // Mostrar info en el título
        document.getElementById('currentTitle').innerHTML = title || truncateUrl(url);
        
        try {
            // Reproducir según formato
            switch(format.type) {
                case 'hls':
                    await playHLS(url, title);
                    break;
                case 'dash':
                    await playDASH(url, title);
                    break;
                case 'mp4':
                    await playMP4(url, title);
                    break;
                case 'audio':
                    await playAudio(url, title);
                    break;
                case 'ts':
                    await playTS(url, title);
                    break;
                default:
                    await playFallback(url, title);
            }
            
            playerStatus.innerHTML = `<i class="fas fa-play"></i> Reproduciendo`;
            streamInfo.innerHTML = `Stream activo`;
            showToast(`🎬 Reproduciendo: ${title || truncateUrl(url)}`, false);
            
        } catch(error) {
            console.error('Error reproducción:', error);
            playerStatus.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Error`;
            streamInfo.innerHTML = `Error: ${error.message}`;
            
            // Mostrar error detallado
            errorInfo.style.display = 'block';
            document.getElementById('errorMessage').innerHTML = `
                <strong>Error:</strong> ${error.message}<br>
                <small>💡 Consejos: Verifica que la URL sea accesible. 
                Si es un stream en vivo, puede estar offline. 
                Prueba recargar o usar otra URL.</small>
            `;
            
            showToast(`Error: ${error.message}`, true);
            
            // Intentar con proxy si es necesario
            if (currentRetryCount < MAX_RETRIES) {
                currentRetryCount++;
                showToast(`Reintentando (${currentRetryCount}/${MAX_RETRIES})...`, false);
                setTimeout(() => playWithProxy(url, title), 2000);
            }
        }
    }

    // Reproducción HLS con múltiples fallbacks
    async function playHLS(url, title) {
        return new Promise((resolve, reject) => {
            if (!videoPlayer) {
                initVideoPlayer();
            }
            
            // Verificar si HLS.js está disponible y es necesario
            if (Hls && Hls.isSupported()) {
                const hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    maxBufferLength: 30,
                    maxMaxBufferLength: 60,
                    manifestLoadingTimeOut: 10000,
                    levelLoadingTimeOut: 10000,
                    xhrSetup: function(xhr, url) {
                        xhr.withCredentials = false;
                    }
                });
                
                hls.loadSource(url);
                hls.attachMedia(videoPlayer.el());
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    videoPlayer.play().catch(e => console.log('Autoplay:', e));
                    resolve();
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        reject(new Error(`HLS Error: ${data.type}`));
                    }
                });
                
                hlsInstance = hls;
            } 
            // Fallback a native HLS (Safari, Edge)
            else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                videoPlayer.src({ src: url, type: 'application/x-mpegURL' });
                videoPlayer.load();
                videoPlayer.play().catch(e => console.log('Autoplay:', e));
                resolve();
            }
            else {
                reject(new Error('HLS no soportado en este navegador'));
            }
        });
    }

    // Reproducción DASH
    async function playDASH(url, title) {
        return new Promise((resolve, reject) => {
            if (!videoPlayer) {
                initVideoPlayer();
            }
            
            if (dashjs && dashjs.MediaPlayer) {
                const player = dashjs.MediaPlayer().create();
                player.initialize(videoPlayer.el(), url, true);
                player.on('error', (e) => reject(new Error(`DASH Error: ${e}`)));
                dashInstance = player;
                resolve();
            } else {
                reject(new Error('DASH.js no disponible'));
            }
        });
    }

    // Reproducción MP4
    async function playMP4(url, title) {
        return new Promise((resolve, reject) => {
            if (!videoPlayer) {
                initVideoPlayer();
            }
            
            videoPlayer.src({ src: url, type: 'video/mp4' });
            videoPlayer.load();
            
            const playPromise = videoPlayer.play();
            if (playPromise) {
                playPromise.then(() => resolve()).catch((e) => {
                    if (e.name === 'NotAllowedError') {
                        resolve(); // Autoplay bloqueado, pero el usuario puede hacer click
                    } else {
                        reject(e);
                    }
                });
            } else {
                resolve();
            }
        });
    }

    // Reproducción Audio
    async function playAudio(url, title) {
        return new Promise((resolve, reject) => {
            const audio = new Audio();
            audio.src = url;
            audio.load();
            
            const playPromise = audio.play();
            if (playPromise) {
                playPromise.then(() => {
                    // Mostrar reproductor de audio
                    const playerContainer = document.querySelector('.player-container');
                    const existingAudio = document.querySelector('.audio-player-custom');
                    if (existingAudio) existingAudio.remove();
                    
                    audio.controls = true;
                    audio.style.width = '100%';
                    audio.style.marginTop = '1rem';
                    audio.className = 'audio-player-custom';
                    playerContainer.appendChild(audio);
                    resolve();
                }).catch(reject);
            } else {
                resolve();
            }
        });
    }

    // Reproducción TS
    async function playTS(url, title) {
        return playMP4(url, title);
    }

    // Fallback con proxy
    async function playWithProxy(url, title) {
        for (let proxy of PROXIES) {
            try {
                const proxyUrl = proxy + encodeURIComponent(url);
                showToast(`Intentando con proxy: ${proxy.split('//')[1]}`, false);
                await playUniversal(proxyUrl, title + ' (proxy)');
                return;
            } catch(e) {
                console.log('Proxy falló:', proxy);
            }
        }
        showToast('Todos los métodos fallaron', true);
    }

    // Fallback genérico
    async function playFallback(url, title) {
        return playMP4(url, title);
    }

    // ==================== VIDEO.JS INICIALIZACIÓN ====================
    function initVideoPlayer() {
        if (videoPlayer) {
            try {
                videoPlayer.dispose();
            } catch(e) {}
        }
        
        const videoElement = document.getElementById('videoPlayer');
        videoPlayer = videojs(videoElement, {
            controls: true,
            autoplay: true,
            preload: 'auto',
            fluid: true,
            playbackRates: [0.5, 0.75, 1, 1.25, 1.5, 2],
            controlBar: {
                pictureInPictureToggle: true,
                volumePanel: { inline: false }
            },
            html5: {
                vhs: {
                    overrideNative: false,
                    handleManifestRedirects: true
                }
            }
        });
        
        // Manejar errores del video
        videoPlayer.on('error', function() {
            const error = videoPlayer.error();
            console.error('Video.js error:', error);
            if (error && error.code === 4) {
                showToast('Error de red o CORS', true);
            }
        });
        
        return videoPlayer;
    }

    // ==================== PARSE M3U ====================
    async function parseM3U(url) {
        showToast('Cargando lista de reproducción...', false);
        document.getElementById('playerStatus').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cargando lista';
        
        try {
            let content = null;
            
            // Intentar fetch directo
            try {
                const response = await fetch(url, { mode: 'cors' });
                if (response.ok) content = await response.text();
            } catch(e) {}
            
            // Si falla, usar proxy
            if (!content) {
                for (let proxy of PROXIES) {
                    try {
                        const response = await fetch(proxy + encodeURIComponent(url));
                        if (response.ok) {
                            content = await response.text();
                            break;
                        }
                    } catch(e) {}
                }
            }
            
            if (!content) throw new Error('No se pudo cargar la lista');
            
            const channels = parseM3UText(content);
            if (channels.length === 0) throw new Error('No se encontraron canales');
            
            renderChannels(channels);
            document.getElementById('sidebar').style.display = 'block';
            showToast(`✅ ${channels.length} canales cargados`, false);
            document.getElementById('playerStatus').innerHTML = `<i class="fas fa-check"></i> ${channels.length} canales`;
            
        } catch(error) {
            showToast('Error al cargar lista: ' + error.message, true);
            document.getElementById('playerStatus').innerHTML = '<i class="fas fa-exclamation"></i> Error';
        }
    }

    function parseM3UText(content) {
        const lines = content.split(/\r?\n/);
        const channels = [];
        let currentChannel = null;
        
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                const match = line.match(/#EXTINF:.*?,(.*)$/);
                if (match) {
                    currentChannel = { name: match[1].trim() };
                }
            } else if (line && !line.startsWith('#') && currentChannel) {
                currentChannel.url = line;
                const format = detectFormat(line);
                currentChannel.type = format.type;
                currentChannel.icon = format.icon;
                channels.push({ ...currentChannel });
                currentChannel = null;
            }
        }
        
        return channels;
    }

    function renderChannels(channels) {
        const container = document.getElementById('channelsList');
        container.innerHTML = '';
        
        channels.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            const format = detectFormat(ch.url);
            
            card.innerHTML = `
                <i class="fas ${format.icon}" style="font-size: 1.5rem;"></i>
                <div style="flex: 1;">
                    <div><strong>${escapeHtml(ch.name.substring(0, 50))}</strong></div>
                    <div style="font-size: 0.7rem; color: #aaa;">${format.name.toUpperCase()}</div>
                </div>
                <i class="fas fa-play-circle" style="color: #ff0000;"></i>
            `;
            card.onclick = () => playUniversal(ch.url, ch.name);
            container.appendChild(card);
        });
    }

    // ==================== UTILIDADES ====================
    function truncateUrl(url, maxLen = 40) {
        return url.length > maxLen ? url.substring(0, maxLen) + '...' : url;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
        toast.style.background = isError ? 'rgba(255,0,0,0.9)' : '#1a1a1a';
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => {
                toast.style.display = 'none';
                toast.style.opacity = '1';
            }, 500);
        }, 4000);
    }

    function stopAll() {
        if (videoPlayer) {
            videoPlayer.pause();
            videoPlayer.src('');
        }
        if (hlsInstance) {
            hlsInstance.destroy();
            hlsInstance = null;
        }
        if (dashInstance) {
            dashInstance.reset();
            dashInstance = null;
        }
        document.getElementById('currentTitle').innerHTML = 'Reproducción detenida';
        document.getElementById('playerStatus').innerHTML = 'Detenido';
        document.getElementById('streamInfo').innerHTML = 'Esperando URL';
        showToast('⏹️ Reproducción detenida', false);
        currentRetryCount = 0;
    }

    function reloadCurrent() {
        if (currentUrl) {
            currentRetryCount = 0;
            playUniversal(currentUrl, currentTitle);
        } else {
            showToast('No hay stream activo', true);
        }
    }

    function goFullscreen() {
        const container = document.querySelector('.player-container');
        if (container.requestFullscreen) container.requestFullscreen();
        else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        else if (container.msRequestFullscreen) container.msRequestFullscreen();
    }

    function loadUrl() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) {
            showToast('Ingresa una URL válida', true);
            return;
        }
        
        const format = detectFormat(url);
        if (format.type === 'playlist') {
            parseM3U(url);
        } else {
            currentRetryCount = 0;
            playUniversal(url, 'Directo');
        }
    }

    // Probar URL de ejemplo
    function testSample() {
        const testUrls = [
            'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8',
            'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4'
        ];
        const randomUrl = testUrls[Math.floor(Math.random() * testUrls.length)];
        document.getElementById('urlInput').value = randomUrl;
        loadUrl();
        showToast('Probando con URL de ejemplo', false);
    }

    // ==================== INICIALIZACIÓN ====================
    function init() {
        initVideoPlayer();
        
        // Event listeners
        document.getElementById('playBtn').onclick = loadUrl;
        document.getElementById('parseBtn').onclick = () => {
            const url = document.getElementById('urlInput').value.trim();
            if (url) parseM3U(url);
            else showToast('Ingresa URL de lista M3U', true);
        };
        document.getElementById('testBtn').onclick = testSample;
        document.getElementById('stopBtn').onclick = stopAll;
        document.getElementById('reloadBtn').onclick = reloadCurrent;
        document.getElementById('fullscreenBtn').onclick = goFullscreen;
        
        document.getElementById('urlInput').onkeypress = (e) => {
            if (e.key === 'Enter') loadUrl();
        };
        
        console.log('✅ FlowIPTV Universal Player - Todos los formatos soportados');
        console.log('📺 Formatos: HLS, DASH, MP4, Audio, TS, M3U');
        console.log('🛡️ Proxies disponibles:', PROXIES.length);
        
        showToast('🎬 FlowIPTV Universal - Listo para reproducir cualquier formato', false);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
</body>
</html>
