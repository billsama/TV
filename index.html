<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Player PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
}

/* 🎬 VIDEO */
.player-container {
    position: fixed;
    inset: 0;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 🔥 BANNER PRO LLAMATIVO */
.banner {
    position: fixed;
    top: calc(10px + env(safe-area-inset-top));
    left: 10px;

    width: min(85vw, 280px);

    padding: 10px 12px;
    border-radius: 14px;

    background: linear-gradient(180deg, rgba(0,0,0,0.65), rgba(0,0,0,0.45));
    backdrop-filter: blur(14px);

    color: #fff;

    z-index: 999;

    box-shadow: 0 6px 25px rgba(0,0,0,0.6);
}

/* 🚀 TITULO */
.title {
    font-size: 13px;
    font-weight: 800;
    color: #00ffae;
    margin-bottom: 4px;
}

/* SUB */
.subtitle {
    font-size: 10px;
    opacity: 0.85;
    margin-bottom: 6px;
}

/* 🔥 SERVICIOS BONITOS */
.services {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px 8px;
    font-size: 10px;
    margin-bottom: 6px;
}

.services div {
    background: rgba(255,255,255,0.05);
    padding: 3px 6px;
    border-radius: 6px;
    text-align: center;
}

/* 📲 CONTACTO */
.contact {
    font-size: 11px;
    font-weight: 700;
    color: #00ffae;
    text-align: center;
}

/* 📱 CELULAR */
@media (max-width: 600px) {
    .title {
        font-size: 11px;
    }

    .subtitle {
        font-size: 9px;
    }

    .services {
        font-size: 9px;
        gap: 2px 6px;
    }

    .contact {
        font-size: 10px;
    }

    .banner {
        width: 75vw;
        padding: 8px 9px;
    }
}

/* 📱 MUY PEQUEÑO */
@media (max-width: 360px) {
    .banner {
        width: 78vw;
    }

    .services {
        grid-template-columns: 1fr 1fr;
    }
}

/* 💻 PC */
@media (min-width: 1024px) {
    .banner {
        width: 300px;
        top: 20px;
        left: 20px;
    }
}
</style>
</head>

<body>

<!-- 🔥 BANNER -->
<div class="banner">

    <div class="title">🚀 IPTV PREMIUM</div>
    <div class="subtitle">Estable • Sin cortes • Alta calidad</div>

    <div class="services">
        <div>Software</div>
        <div>TV Box</div>
        <div>Antivirus</div>
        <div>Cuentas</div>
    </div>

    <div class="contact">📲 935 719 978</div>

</div>

<!-- 🎬 VIDEO -->
<div class="player-container">
    <video id="video" autoplay muted playsinline></video>
</div>

<script>
const video = document.getElementById("video");

const playlist = [
"https://dl.dropboxusercontent.com/scl/fi/4zbtcy2zdg1upztjvw9ty/tv_Sjow.mp4?rlkey=fz4swcg4iul7kqlq0jdt7rajk",
"https://dl.dropboxusercontent.com/scl/fi/vlyjfym5lkq74j60vv3d7/wsdw.mp4?rlkey=cefh6u2imupuuxlnb3x8g17jt",
"https://dl.dropboxusercontent.com/scl/fi/1tgi7i2xjdfuoin8b9aw1/gag.mp4?rlkey=sqzfdxe5cphqt5a2z4pz5fjn6",
"https://dl.dropboxusercontent.com/scl/fi/6v7230f6drvhrxaxc8282/scdddg.mp4?rlkey=4uf552fthex3e93i28br4t7cd",
"https://dl.dropboxusercontent.com/scl/fi/c4rifovakuhmbvds9ybq2/scdvdv.mp4?rlkey=erq3a307ywolnyev6qd8wpkjk",
"https://dl.dropboxusercontent.com/scl/fi/wcktveyjs0rmuvz28z01t/QUIIZTOK.mp4?rlkey=liizv1alk9yzi06ecrxlo533n",
"https://dl.dropboxusercontent.com/scl/fi/hy6kvjz8knjkxx2noln0f/ZYMARGO.mp4?rlkey=jo4avkoosl2k90prudf7ft6ae"
];

let shuffled = [];
let current = 0;

function shufflePlaylist() {
    shuffled = [...playlist]
        .map(v => ({ v, r: Math.random() }))
        .sort((a,b) => a.r - b.r)
        .map(x => x.v);

    current = 0;
}

function playVideo() {
    if (current >= shuffled.length) shufflePlaylist();

    video.src = shuffled[current];
    video.load();

    video.play().catch(() => {
        setTimeout(playVideo, 1000);
    });

    current++;
}

video.addEventListener("ended", playVideo);
video.addEventListener("error", playVideo);

shufflePlaylist();
playVideo();

setTimeout(() => {
    video.muted = false;
    video.play().catch(()=>{});
}, 1000);

document.addEventListener("click", () => {
    video.muted = false;
    video.play();
}, { once: true });
</script>

</body>
</html>
