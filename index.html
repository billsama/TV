<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Player PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
}

/* 🎬 PLAYER */
.player-container {
    width: 100%;
    height: 100vh;
    height: 100svh;
    height: 100dvh;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 📢 BANNER ARRIBA IZQUIERDA (FIX REAL) */
.banner {
    position: fixed;
    top: calc(10px + env(safe-area-inset-top));
    left: 10px;

    padding: 10px 12px;
    border-radius: 12px;

    background: rgba(0, 0, 0, 0.72);
    backdrop-filter: blur(12px);

    color: #fff;
    font-size: 10px;
    font-weight: 600;
    line-height: 1.3;

    max-width: 260px;

    z-index: 999;
}

/* highlight */
.banner span {
    color: #00ffae;
    font-weight: 800;
}

/* 📱 MOBILE (YA NO CENTRA, SE QUEDA IZQUIERDA ARRIBA) */
@media (max-width: 600px) {
    .banner {
        left: 10px;
        top: calc(8px + env(safe-area-inset-top));
        transform: none; /* 🔥 IMPORTANTE: evita centrado */
        font-size: 9px;
        max-width: 200px;
    }
}
</style>
</head>

<body>

<!-- 📢 BANNER -->
<div class="banner">
    <div>🚀 <span>Streaming Premium HD</span> sin anuncios • sin cortes</div>
    <div>WhatsApp / Telegram: 935-719-978</div>
</div>

<!-- 🎬 VIDEO -->
<div class="player-container">
    <video id="video" autoplay muted playsinline></video>
</div>

<script>
const video = document.getElementById("video");

const playlist = [
"https://dl.dropboxusercontent.com/scl/fi/4zbtcy2zdg1upztjvw9ty/tv_Sjow.mp4?rlkey=fz4swcg4iul7kqlq0jdt7rajk",
"https://dl.dropboxusercontent.com/scl/fi/vlyjfym5lkq74j60vv3d7/wsdw.mp4?rlkey=cefh6u2imupuuxlnb3x8g17jt",
"https://dl.dropboxusercontent.com/scl/fi/1tgi7i2xjdfuoin8b9aw1/gag.mp4?rlkey=sqzfdxe5cphqt5a2z4pz5fjn6",
"https://dl.dropboxusercontent.com/scl/fi/6v7230f6drvhrxaxc8282/scdddg.mp4?rlkey=4uf552fthex3e93i28br4t7cd",
"https://dl.dropboxusercontent.com/scl/fi/c4rifovakuhmbvds9ybq2/scdvdv.mp4?rlkey=erq3a307ywolnyev6qd8wpkjk",
"https://www.dropbox.com/scl/fi/c10q0u7wx3zyjgb7dub50/TikVid.io_7624632577709575444.mp4?rlkey=fa0q2z97t77vml11j1evn25pw&st=fxzvk8eg&raw=1"
];

let shuffled = [];
let current = 0;

function shufflePlaylist() {
    shuffled = [...playlist]
        .map(v => ({ v, r: Math.random() }))
        .sort((a,b) => a.r - b.r)
        .map(x => x.v);

    current = 0;
}

function playVideo() {
    if (current >= shuffled.length) shufflePlaylist();

    video.src = shuffled[current];
    video.load();

    video.play().catch(() => {
        setTimeout(playVideo, 1000);
    });

    current++;
}

video.addEventListener("ended", playVideo);
video.addEventListener("error", playVideo);

shufflePlaylist();
playVideo();

/* 🔊 AUDIO 1s */
setTimeout(() => {
    video.muted = false;
    video.volume = 1;
    video.play().catch(()=>{});
}, 1000);

/* MOBILE FIX */
document.addEventListener("click", () => {
    video.muted = false;
    video.play();
}, { once: true });

</script>

</body>
</html>
