<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JNTV Live Player</title>
<link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #e60000;
    --dark: #0a0a0a;
    --panel: #111;
    --border: #222;
    --text: #f0f0f0;
    --muted: #666;
    --gold: #f5a623;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  .wrapper { width: 100%; max-width: 900px; }

  header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
  }
  .logo span { color: var(--red); }

  .live-badge {
    background: var(--red);
    color: #fff;
    font-weight: 600;
    font-size: 0.75rem;
    letter-spacing: 2px;
    padding: 3px 10px;
    border-radius: 2px;
    animation: pulse-badge 2s infinite;
  }

  @keyframes pulse-badge {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .url-box {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .url-box input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .url-box input::placeholder { color: var(--muted); }
  .url-box input:focus { border-color: var(--red); }

  .url-box button {
    background: var(--red);
    color: #fff;
    border: none;
    padding: 10px 22px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 3px;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .url-box button:hover { opacity: 0.85; }

  .proxy-selector {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  .proxy-selector span {
    font-size: 0.78rem;
    color: var(--muted);
    margin-right: 4px;
    letter-spacing: 0.5px;
  }

  .proxy-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 13px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.82rem;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .proxy-btn:hover { border-color: var(--red); color: var(--text); }
  .proxy-btn.selected { border-color: var(--red); color: #fff; background: #200000; }

  /* Destacar el proxy propio */
  .proxy-btn.own {
    border-color: var(--gold);
    color: var(--gold);
  }
  .proxy-btn.own:hover { background: #1a1200; }
  .proxy-btn.own.selected { background: #1a1200; color: var(--gold); border-color: var(--gold); }

  .player-shell {
    background: #000;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .video-js {
    width: 100% !important;
    aspect-ratio: 16/9;
    height: auto !important;
  }

  .statusbar {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.82rem;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .status-left { display: flex; align-items: center; gap: 10px; }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .dot.active { background: #00e676; box-shadow: 0 0 6px #00e676; }
  .dot.error  { background: var(--red); box-shadow: 0 0 6px var(--red); }

  #statusText { transition: color 0.3s; }
  .proxy-info { font-size: 0.75rem; color: var(--muted); }
  .proxy-info b { color: var(--text); }

  footer {
    margin-top: 14px;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="logo">JN<span>TV</span></div>
    <div class="live-badge">● EN VIVO</div>
  </header>

  <!-- URL manual -->
  <div class="url-box">
    <input type="text" id="urlInput" placeholder="Pega tu URL aquí: https://ejemplo.com/stream.m3u8" />
    <button onclick="playURL()">▶ PLAY</button>
  </div>

  <!-- Selector de proxy -->
  <div class="proxy-selector">
    <span>PROXY:</span>
    <button class="proxy-btn selected"  data-proxy="direct"      onclick="selectProxy(this)">Directo</button>
    <button class="proxy-btn own"       data-proxy="servilive"   onclick="selectProxy(this)">★ Mi Servidor</button>
    <button class="proxy-btn"           data-proxy="allorigins"  onclick="selectProxy(this)">AllOrigins</button>
    <button class="proxy-btn"           data-proxy="corsproxy"   onclick="selectProxy(this)">CORSProxy.io</button>
    <button class="proxy-btn"           data-proxy="thingproxy"  onclick="selectProxy(this)">ThingProxy</button>
    <button class="proxy-btn"           data-proxy="auto"        onclick="selectProxy(this)">🔁 Auto</button>
  </div>

  <!-- Player -->
  <div class="player-shell">
    <video id="vjPlayer"
      class="video-js vjs-default-skin vjs-big-play-centered"
      controls playsinline muted preload="metadata">
    </video>
    <div class="statusbar">
      <div class="status-left">
        <div class="dot" id="dot"></div>
        <span id="statusText">Esperando URL...</span>
      </div>
      <div class="proxy-info">Proxy activo: <b id="proxyLabel">—</b></div>
    </div>
  </div>

  <footer>Player JNTV — servilive.com:3028 proxy integrado</footer>
</div>

<script src="https://vjs.zencdn.net/8.16.1/video.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/videojs-http-streaming@3.10.0/dist/videojs-http-streaming.min.js"></script>
<script>
  let player = null;
  let selectedProxy = 'direct';

  // Tu servidor proxy propio primero en la lista de Auto
  const PROXY_LIST = [
    {
      key: 'direct',
      label: 'Directo',
      wrap: url => url
    },
    {
      key: 'servilive',
      label: '★ Mi Servidor (servilive)',
      // Tu servidor actúa como proxy: reenvía la petición con CORS abierto
      wrap: url => `https://servilive.com:3028/proxy?url=${encodeURIComponent(url)}`
    },
    {
      key: 'allorigins',
      label: 'AllOrigins',
      wrap: url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
    },
    {
      key: 'corsproxy',
      label: 'CORSProxy.io',
      wrap: url => `https://corsproxy.io/?${encodeURIComponent(url)}`
    },
    {
      key: 'thingproxy',
      label: 'ThingProxy',
      wrap: url => `https://thingproxy.freeboard.io/fetch/${url}`
    },
  ];

  const dot        = document.getElementById('dot');
  const statusText = document.getElementById('statusText');
  const proxyLabel = document.getElementById('proxyLabel');

  function setStatus(state, msg) {
    dot.className = 'dot' + (state === 'ok' ? ' active' : state === 'err' ? ' error' : '');
    statusText.textContent = msg;
    statusText.style.color = state === 'ok' ? '#00e676' : state === 'err' ? '#e60000' : '#aaa';
  }

  function selectProxy(btn) {
    document.querySelectorAll('.proxy-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedProxy = btn.dataset.proxy;
  }

  function playURL() {
    const raw = document.getElementById('urlInput').value.trim();
    if (!raw) { setStatus('err', 'Ingresa una URL válida'); return; }

    if (selectedProxy === 'auto') {
      tryAutoProxy(raw, 0);
    } else {
      const p = PROXY_LIST.find(x => x.key === selectedProxy) || PROXY_LIST[0];
      loadStream(p.wrap(raw), p.label, raw);
    }
  }

  function tryAutoProxy(raw, index) {
    if (index >= PROXY_LIST.length) {
      setStatus('err', 'Ningún proxy funcionó. Verifica la URL.');
      return;
    }
    const p = PROXY_LIST[index];
    setStatus('wait', `Probando ${p.label}...`);
    proxyLabel.textContent = p.label;
    loadStream(p.wrap(raw), p.label, raw, () => tryAutoProxy(raw, index + 1));
  }

  function loadStream(src, label, rawURL, onError) {
    setStatus('wait', `Conectando — ${label}...`);
    proxyLabel.textContent = label;

    const isHLS = (src + (rawURL || '')).includes('.m3u8');
    const type  = isHLS ? 'application/x-mpegURL' : 'video/mp4';

    if (!player) {
      player = videojs('vjPlayer', {
        fluid: true,
        liveui: true,
        html5: { vhs: { overrideNative: true, enableLowInitialPlaylist: true } },
        sources: [{ src, type }],
      });
      player.ready(() => player.play().catch(() => {}));
      player.on('playing', () => setStatus('ok', 'Transmisión activa'));
      player.on('waiting', () => setStatus('wait', 'Buffering...'));
      player.on('error',   () => { setStatus('err', `Error — ${label}`); if (onError) onError(); });
    } else {
      player.src({ src, type });
      player.load();
      player.play().catch(() => {});
      player.one('playing', () => setStatus('ok', 'Transmisión activa'));
      player.one('error',   () => { setStatus('err', `Error — ${label}`); if (onError) onError(); });
    }
  }

  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') playURL();
  });
</script>
</body>
</html>
