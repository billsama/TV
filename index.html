<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FlowIPTV Pro | Xtream · M3U8 · Radio · Audio · Sin CORS</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Video.js Core -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.min.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f0f;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #0f0f0f;
            border-bottom: 1px solid #272727;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo i {
            background: none;
            color: #ff0000;
            font-size: 1.5rem;
        }

        .search-bar {
            flex: 1;
            max-width: 700px;
            min-width: 280px;
            display: flex;
            gap: 0;
            border-radius: 40px;
            overflow: hidden;
            background: #121212;
            border: 1px solid #303030;
            transition: all 0.2s;
        }

        .search-bar:focus-within {
            border-color: #ff0000;
        }

        .search-bar input {
            flex: 1;
            background: #121212;
            border: none;
            padding: 0.75rem 1.2rem;
            color: white;
            font-size: 0.9rem;
            outline: none;
            font-family: inherit;
        }

        .search-bar input::placeholder {
            color: #888;
        }

        .search-bar button {
            background: #222;
            border: none;
            padding: 0 1.2rem;
            cursor: pointer;
            color: #fff;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .search-bar button:hover {
            background: #3f3f3f;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: 0.2s;

            height: 40px;

        }

        .icon-btn:hover {

        }

        .main-content {
            display: flex;
            flex: 1;
            padding: 1.5rem;
            gap: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;

        }

        .player-section {
            flex: 2;
            min-width: 0;
        }

        .player-wrapper {
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .video-js {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .video-js .vjs-big-play-button {
            background-color: rgba(255,0,0,0.7);
            border-radius: 50%;
        }

        .player-footer {
            background: #1a1a1a;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
            border-top: 1px solid #2a2a2a;
        }

        .media-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #2a2a2a;
            padding: 0.35rem 0.9rem;
            border-radius: 30px;

        }

        .media-badge i {
            font-size: 0.9rem;
        }

        .control-group {
            display: flex;
            gap: 0.5rem;
        }

        .ctrl-btn-sm {
            background: #2a2a2a;
            border: none;
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }

        .ctrl-btn-sm:hover {
            background: #ff0000;
        }

        .media-info {
            font-size: 0.75rem;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .media-info span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .audio-card {
            background: linear-gradient(135deg, #1e1e2a, #0a0a0a);
            border-radius: 1rem;
            padding: 1.5rem;
            display: none;
            text-align: center;
        }

        .audio-visualizer {
            width: 100%;
            height: 100px;
            background: linear-gradient(90deg, #ff0000, #ff6b6b, #ff0000);
            background-size: 200% auto;
            border-radius: 50px;
            margin: 1rem 0;
            position: relative;
            animation: wave 3s ease infinite;
        }

        @keyframes wave {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        audio {
            width: 100%;
            margin-top: 1rem;
            border-radius: 40px;
        }

        .sidebar {
            flex: 1;
            min-width: 300px;
            max-width: 380px;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #272727;
        }

        .channels-scroll {
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .channel-item {
            background: #1a1a1a;
            border-radius: 0.75rem;
            padding: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .channel-item:hover {
            background: #252525;
            border-color: #ff0000;
            transform: translateX(3px);
        }

        .channel-icon {
            width: 44px;
            height: 44px;
            border-radius: 0.5rem;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .channel-details {
            flex: 1;
        }

        .channel-name {
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 0.2rem;
        }

        .channel-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.65rem;
            color: #888;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #ff0000;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .channels-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .channels-scroll::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .channels-scroll::-webkit-scrollbar-thumb {
            background: #ff0000;
            border-radius: 10px;
        }

        .cors-warning {
            background: rgba(255, 0, 0, 0.1);
            border-left: 3px solid #ff0000;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            display: none;
            transition: opacity 0.3s;
        }

        .proxy-status {
            background: rgba(0, 255, 0, 0.1);
            border-left: 3px solid #00ff00;
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
                padding: 1rem;
            }
            .sidebar {
                max-width: 100%;
            }
            .search-bar {
                order: 3;
                width: 100%;
                max-width: 100%;
            }
            .header {
                padding: 0.5rem 1rem;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">
            <i class="fab fa-youtube"></i>
            <span>FlowIPTV Pro</span>
        </div>
        <div class="search-bar">
            <input type="text" id="urlInput" placeholder="Pega tu enlace: Xtream M3U · M3U8 · MP3 · Radio · Lista M3U">
            <button id="playBtn"><i class="fas fa-play"></i></button>
            <button id="parseBtn"><i class="fas fa-list-ul"></i></button>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="stopBtn" title="Detener"><i class="fas fa-stop"></i></button>
            <button class="icon-btn" id="reloadBtn" title="Recargar"><i class="fas fa-sync-alt"></i></button>
        </div>
    </div>

    <div class="main-content">
        <div class="player-section">
            <div class="cors-warning" id="corsWarning">
                <i class="fas fa-shield-alt"></i> Modo proxy activado - Solucionando problemas de CORS
            </div>
            <div class="player-wrapper" id="videoWrapper">
                <video id="videoPlayer" class="video-js vjs-big-play-centered" controls preload="auto" playsinline crossorigin="anonymous"></video>
                <div class="player-footer">
                    <div class="media-badge" id="typeBadge">
                        <i class="fas fa-question"></i>
                        <span>MEDIA</span>
                    </div>
                    <div class="media-info">
                        <i class="fas fa-link"></i>
                        <span id="currentLabel">Listo para reproducir</span>
                    </div>
                    <div class="control-group">
                        <button class="ctrl-btn-sm" id="miniStop"><i class="fas fa-stop"></i></button>
                        <button class="ctrl-btn-sm" id="miniReload"><i class="fas fa-rotate-right"></i></button>
                    </div>
                </div>
            </div>

            <div class="audio-card" id="audioCard">
                <div class="audio-visualizer">
                    <i class="fas fa-music" style="font-size: 2.5rem; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.7;"></i>
                </div>
                <audio id="nativeAudio" controls crossorigin="anonymous"></audio>
                <div class="media-info" style="justify-content: center; margin-top: 0.75rem;" id="audioInfo"></div>
            </div>
        </div>

        <div class="sidebar" id="sidebar" style="display: none;">
            <div class="sidebar-header">
                <h4 style="font-size: 0.9rem;"><i class="fas fa-th-list"></i> Lista de reproducción</h4>
                <button class="icon-btn" id="clearListBtn" style="width: 32px; height: 32px;"><i class="fas fa-trash-alt"></i></button>
            </div>
            <div class="channels-scroll" id="channelsList"></div>
        </div>
    </div>
</div>

<script>
    // ==================== PROXY CORS MEJORADO - IGUAL QUE APPCREATOR 24 ====================
    // Múltiples proxies para máxima compatibilidad
    const CORS_PROXIES = [
        'https://cors-anywhere.herokuapp.com/',
        'https://api.allorigins.win/raw?url=',
        'https://corsproxy.io/?',
        'https://proxy.cors.sh/',
        'https://cors.zebr.me/',
        'https://thingproxy.freeboard.io/fetch/'
    ];
    
    let currentProxyIndex = 0;
    
    // 🔥 FUNCIÓN PRINCIPAL - APLICA PROXY A TODOS LOS CONTENIDOS SIN EXCEPCIÓN
    function getProxyUrl(url) {
        // URLs locales o datos no necesitan proxy
        if (!url || url.startsWith('/') || url.startsWith('data:') || url.startsWith('blob:')) {
            return url;
        }
        
        // Si ya tiene proxy, no aplicar doble
        for (let proxy of CORS_PROXIES) {
            if (url.startsWith(proxy)) {
                return url;
            }
        }
        
        // APLICAR PROXY A TODO: .m3u8, .mp4, .ts, .mp3, etc.
        return CORS_PROXIES[currentProxyIndex] + encodeURIComponent(url);
    }
    
    function showMessage(msg, isError = false) {
        const warning = document.getElementById('corsWarning');
        warning.style.display = 'block';
        warning.style.background = isError ? 'rgba(255,0,0,0.2)' : 'rgba(0,255,0,0.1)';
        warning.style.borderLeftColor = isError ? '#ff0000' : '#00ff00';
        warning.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        
        setTimeout(() => {
            warning.style.opacity = '0';
            setTimeout(() => {
                warning.style.display = 'none';
                warning.style.opacity = '1';
                warning.style.background = 'rgba(255,0,0,0.1)';
                warning.style.borderLeftColor = '#ff0000';
            }, 500);
        }, 4000);
    }
    
    function switchToNextProxy() {
        currentProxyIndex = (currentProxyIndex + 1) % CORS_PROXIES.length;
        const proxyName = CORS_PROXIES[currentProxyIndex].split('//')[1]?.split('/')[0] || 'nuevo proxy';
        showMessage(`🔄 Cambiando a proxy: ${proxyName}`, false);
        return currentProxyIndex;
    }
    
    async function fetchWithAutoProxy(url) {
        for (let i = 0; i < CORS_PROXIES.length; i++) {
            try {
                const proxyUrl = CORS_PROXIES[i] + encodeURIComponent(url);
                const response = await fetch(proxyUrl);
                if (response.ok) {
                    currentProxyIndex = i;
                    showMessage(`✅ Proxy conectado: ${CORS_PROXIES[i].split('//')[1]?.split('/')[0]}`, false);
                    return await response.text();
                }
            } catch(e) {
                console.warn(`Proxy ${i} falló:`, e);
            }
        }
        throw new Error("Todos los proxies fallaron");
    }
    
    // ==================== DOM Elements ====================
    const videoElement = document.getElementById('videoPlayer');
    const urlInput = document.getElementById('urlInput');
    const playBtn = document.getElementById('playBtn');
    const parseBtn = document.getElementById('parseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const reloadBtn = document.getElementById('reloadBtn');
    const miniStop = document.getElementById('miniStop');
    const miniReload = document.getElementById('miniReload');
    const typeBadge = document.getElementById('typeBadge');
    const currentLabel = document.getElementById('currentLabel');
    const audioCard = document.getElementById('audioCard');
    const videoWrapper = document.getElementById('videoWrapper');
    const nativeAudio = document.getElementById('nativeAudio');
    const audioInfo = document.getElementById('audioInfo');
    const sidebar = document.getElementById('sidebar');
    const channelsList = document.getElementById('channelsList');
    const clearListBtn = document.getElementById('clearListBtn');

    // ==================== Variables ====================
    let videoPlayer = null;
    let currentUrl = null;
    let currentTitle = null;
    let currentMediaType = null;
    let currentChannelList = [];
    let retryCount = 0;
    const MAX_RETRIES = 3;

    // ==================== Detección de tipo ====================
    function detectMediaType(url, title = '') {
        const urlLower = url.toLowerCase();
        const titleLower = title.toLowerCase();
        
        if (urlLower.includes('get.php') && (urlLower.includes('username=') || urlLower.includes('password='))) {
            return { type: 'xtream', icon: 'fa-tower-cell', color: '#ff6b6b', label: 'XTREAM' };
        }
        if (urlLower.includes('.m3u8') || urlLower.includes('m3u8') || (urlLower.includes('live') && urlLower.includes('.ts'))) {
            return { type: 'live', icon: 'fa-circle', color: '#ff0000', label: 'LIVE' };
        }
        if (urlLower.includes('radio') || urlLower.includes('icecast') || urlLower.includes(':8000') || 
            urlLower.includes('/radio') || (titleLower.includes('radio') && !urlLower.includes('.m3u8'))) {
            return { type: 'radio', icon: 'fa-broadcast-tower', color: '#3b82f6', label: 'RADIO' };
        }
        if (urlLower.endsWith('.mp3') || urlLower.endsWith('.aac') || urlLower.endsWith('.ogg') || 
            urlLower.endsWith('.wav') || urlLower.endsWith('.flac') || urlLower.includes('/stream') || 
            urlLower.includes('listen') || urlLower.includes('audio')) {
            return { type: 'audio', icon: 'fa-headphones', color: '#10b981', label: 'AUDIO' };
        }
        if (urlLower.endsWith('.mp4') || urlLower.endsWith('.mkv') || urlLower.endsWith('.mov') || 
            urlLower.endsWith('.avi') || urlLower.endsWith('.ts') || urlLower.includes('video')) {
            return { type: 'video', icon: 'fa-film', color: '#f59e0b', label: 'VIDEO' };
        }
        return { type: 'media', icon: 'fa-play-circle', color: '#fff', label: 'MEDIA' };
    }

    function updateBadge(url, title) {
        const info = detectMediaType(url, title);
        typeBadge.innerHTML = `<i class="fas ${info.icon}" style="color: ${info.color};"></i> <span>${info.label}</span>`;
        return info;
    }

    // ==================== Video.js Player ====================
    function initVideoPlayer() {
        if (videoPlayer) {
            try {
                videoPlayer.dispose();
            } catch(e) {}
        }
        videoPlayer = videojs(videoElement, {
            controls: true,
            autoplay: true,
            preload: 'auto',
            fluid: true,
            playbackRates: [0.5, 0.75, 1, 1.25, 1.5, 2],
            html5: {
                hls: {
                    enableLowInitialPlaylist: true,
                    smoothQualityChange: true,
                    overrideNative: true
                }
            },
            controlBar: {
                volumePanel: { inline: false }
            }
        });
        return videoPlayer;
    }

    function getMimeType(url) {
        const urlLower = url.toLowerCase();
        if (urlLower.includes('.m3u8')) return 'application/x-mpegURL';
        if (urlLower.includes('.mp4')) return 'video/mp4';
        if (urlLower.includes('.ts')) return 'video/MP2T';
        return 'application/x-mpegURL';
    }

    // 🔥 FUNCIÓN PRINCIPAL DE REPRODUCCIÓN - CON PROXY EN TODO
    function playWithVideoJs(url, title = '') {
        try {
            if (!videoPlayer) {
                initVideoPlayer();
            } else {
                videoPlayer.pause();
                videoPlayer.src('');
            }
            
            videoWrapper.style.display = 'block';
            audioCard.style.display = 'none';
            
            // APLICAR PROXY A LA URL DEL VIDEO
            const proxiedUrl = getProxyUrl(url);
            console.log(`🎬 Reproduciendo: ${proxiedUrl.substring(0, 80)}...`);
            
            videoPlayer.src({ src: proxiedUrl, type: getMimeType(proxiedUrl) });
            videoPlayer.load();
            
            const playPromise = videoPlayer.play();
            if (playPromise) {
                playPromise.catch(e => {
                    console.warn("Error:", e);
                    if (e.name === 'NotAllowedError') {
                        currentLabel.innerText = `🔇 Click play: ${title || truncateUrl(url)}`;
                    } else if (e.message && (e.message.includes('CORS') || e.message.includes('Network'))) {
                        if (retryCount < MAX_RETRIES) {
                            retryCount++;
                            showMessage(`⚠️ Error CORS, cambiando proxy (intento ${retryCount}/${MAX_RETRIES})`, true);
                            switchToNextProxy();
                            setTimeout(() => playWithVideoJs(url, title), 1000);
                        } else {
                            currentLabel.innerText = `🌐 Error CORS persistente - Prueba otro enlace`;
                            showMessage(`❌ Error CORS: El servidor bloquea la reproducción. Prueba con otro enlace.`, true);
                            retryCount = 0;
                        }
                    } else {
                        currentLabel.innerText = `❌ Error: ${title || truncateUrl(url)}`;
                    }
                });
            }
            
            videoPlayer.off('error');
            videoPlayer.on('error', function() {
                const error = videoPlayer.error();
                console.error("Video error:", error);
                if (error && (error.code === 4 || error.message?.includes('CORS'))) {
                    if (retryCount < MAX_RETRIES) {
                        retryCount++;
                        showMessage(`⚠️ Error CORS, cambiando proxy (intento ${retryCount}/${MAX_RETRIES})`, true);
                        switchToNextProxy();
                        setTimeout(() => playWithVideoJs(url, title), 1000);
                    } else {
                        currentLabel.innerText = `🌐 Error CORS - Servidor bloquea acceso`;
                        retryCount = 0;
                    }
                } else {
                    currentLabel.innerText = `❌ Error: ${title || truncateUrl(url)}`;
                }
            });
            
            videoPlayer.on('playing', () => {
                currentLabel.innerText = title || truncateUrl(url);
                retryCount = 0;
                showMessage(`🎉 Reproduciendo: ${title || truncateUrl(url)}`, false);
            });
            
            currentUrl = url;
            currentTitle = title;
            currentMediaType = 'video';
            updateBadge(url, title);
            currentLabel.innerText = title || truncateUrl(url);
            
        } catch(err) {
            console.error(err);
            currentLabel.innerText = 'Error al iniciar reproductor';
        }
    }

    // ==================== Audio Player ====================
    function playAudio(url, title = '') {
        if (videoPlayer) {
            videoPlayer.pause();
            videoPlayer.src('');
        }
        
        videoWrapper.style.display = 'none';
        audioCard.style.display = 'block';
        
        nativeAudio.pause();
        nativeAudio.src = '';
        nativeAudio.load();
        
        const audioUrl = getProxyUrl(url);
        nativeAudio.src = audioUrl;
        nativeAudio.load();
        
        nativeAudio.play().catch(e => {
            console.warn("Audio error:", e);
            if (retryCount < MAX_RETRIES) {
                retryCount++;
                showMessage(`⚠️ Error en audio, cambiando proxy (${retryCount}/${MAX_RETRIES})`, true);
                switchToNextProxy();
                setTimeout(() => playAudio(url, title), 1000);
            } else {
                audioInfo.innerHTML = '<i class="fas fa-volume-off"></i> Error CORS - prueba otro enlace';
                retryCount = 0;
            }
        });
        
        audioInfo.innerHTML = `<i class="fas fa-headphones"></i> ${title || truncateUrl(url)}`;
        currentLabel.innerText = title || truncateUrl(url);
        currentUrl = url;
        currentTitle = title;
        currentMediaType = 'audio';
        updateBadge(url, title);
        
        nativeAudio.onerror = () => {
            if (retryCount < MAX_RETRIES) {
                retryCount++;
                switchToNextProxy();
                setTimeout(() => playAudio(url, title), 1000);
            }
        };
        
        nativeAudio.oncanplay = () => {
            retryCount = 0;
            showMessage(`🎵 Reproduciendo audio: ${title || truncateUrl(url)}`, false);
        };
    }

    // ==================== Decisión principal ====================
    function playMedia(url, title = '') {
        if (!url) {
            alert("URL no válida");
            return;
        }
        const typeInfo = detectMediaType(url, title);
        
        if (typeInfo.type === 'radio' || typeInfo.type === 'audio') {
            playAudio(url, title);
        } else {
            playWithVideoJs(url, title);
        }
    }

    // ==================== Cargar M3U ====================
    async function parseM3uFromUrl(m3uUrl) {
        try {
            currentLabel.innerText = '📡 Cargando lista de canales...';
            showMessage('📡 Cargando lista con proxy CORS...', false);
            
            let text;
            try {
                const response = await fetch(m3uUrl);
                if (response.ok) {
                    text = await response.text();
                } else {
                    throw new Error("Direct fetch failed");
                }
            } catch(e) {
                text = await fetchWithAutoProxy(m3uUrl);
            }
            
            const channels = parseM3uText(text);
            if (channels.length === 0) throw new Error("No se encontraron canales");
            currentChannelList = channels;
            renderSidebar(channels);
            sidebar.style.display = 'block';
            currentLabel.innerText = `✅ ${channels.length} canales cargados`;
            showMessage(`✅ ${channels.length} canales listos para reproducir`, false);
        } catch(err) {
            alert("Error al cargar lista: " + err.message + "\n\n💡 Tip: Algunos servidores bloquean CORS. Prueba con otro enlace.");
            currentLabel.innerText = '❌ Error al cargar lista';
        }
    }

    function parseM3uText(content) {
        const lines = content.split(/\r?\n/);
        const items = [];
        let currentExtinf = null;
        
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line.startsWith('#EXTINF:')) {
                const infoRaw = line.substring(8);
                let name = infoRaw;
                const commaIndex = infoRaw.lastIndexOf(',');
                if (commaIndex !== -1) name = infoRaw.substring(commaIndex + 1).trim();
                let group = "General";
                const groupMatch = infoRaw.match(/group-title="([^"]+)"/i);
                if (groupMatch) group = groupMatch[1];
                let logo = null;
                const logoMatch = infoRaw.match(/tvg-logo="([^"]+)"/i);
                if (logoMatch) logo = logoMatch[1];
                currentExtinf = { name: name || "Sin nombre", group, logo };
            }
            else if (line && !line.startsWith('#') && currentExtinf) {
                const url = line;
                const typeInfo = detectMediaType(url, currentExtinf.name);
                items.push({
                    name: currentExtinf.name,
                    url: url,
                    type: typeInfo.type,
                    icon: typeInfo.icon,
                    group: currentExtinf.group,
                    logo: currentExtinf.logo
                });
                currentExtinf = null;
            }
            if (line.startsWith('#') && !line.startsWith('#EXTINF')) currentExtinf = null;
        }
        
        if (items.length === 0 && content.includes('http')) {
            const urls = content.match(/https?:\/\/[^\s]+/g);
            if (urls) {
                urls.forEach(url => {
                    const typeInfo = detectMediaType(url);
                    items.push({ name: "Enlace directo", url: url, type: typeInfo.type, icon: typeInfo.icon });
                });
            }
        }
        return items;
    }

    function renderSidebar(channels) {
        channelsList.innerHTML = '';
        channels.forEach((ch) => {
            const item = document.createElement('div');
            item.className = 'channel-item';
            const isLive = ch.type === 'live';
            const iconClass = ch.icon || detectMediaType(ch.url, ch.name).icon;
            
            item.innerHTML = `
                <div class="channel-icon">
                    ${ch.logo ? `<img src="${ch.logo}" style="width:36px;height:36px;object-fit:cover;border-radius:8px;" onerror="this.src=''">` : `<i class="fas ${iconClass}"></i>`}
                </div>
                <div class="channel-details">
                    <div class="channel-name">${escapeHtml(ch.name.substring(0, 50))}</div>
                    <div class="channel-meta">
                        <i class="fas ${iconClass}" style="font-size:0.6rem;"></i>
                        <span>${ch.type.toUpperCase()}</span>
                        ${isLive ? '<span class="live-dot"></span>' : ''}
                    </div>
                </div>
                <i class="fas fa-play-circle" style="color:#ff0000; font-size:1.2rem;"></i>
            `;
            item.addEventListener('click', () => playMedia(ch.url, ch.name));
            channelsList.appendChild(item);
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function truncateUrl(url, maxLen = 50) {
        return url.length > maxLen ? url.substring(0, maxLen) + '...' : url;
    }

    function loadDirectUrl() {
        let rawUrl = urlInput.value.trim();
        if (!rawUrl) {
            alert("🔗 Ingresa un enlace (Xtream M3U, M3U8, MP3, Radio, etc)");
            return;
        }
        if ((rawUrl.endsWith('.m3u') || rawUrl.includes('type=m3u')) && !rawUrl.endsWith('.m3u8')) {
            parseM3uFromUrl(rawUrl);
        } else {
            playMedia(rawUrl, "Directo");
        }
    }

    function stopAll() {
        if (videoPlayer) {
            videoPlayer.pause();
            videoPlayer.src('');
            videoPlayer.load();
        }
        nativeAudio.pause();
        nativeAudio.src = '';
        nativeAudio.load();
        audioCard.style.display = 'none';
        videoWrapper.style.display = 'block';
        currentUrl = null;
        currentTitle = null;
        currentMediaType = null;
        currentLabel.innerText = '⏹️ Reproducción detenida';
        typeBadge.innerHTML = '<i class="fas fa-stop-circle"></i> <span>DETENIDO</span>';
        audioInfo.innerHTML = '';
        retryCount = 0;
    }

    function reloadCurrent() {
        if (currentUrl && currentMediaType) {
            currentLabel.innerText = '🔄 Recargando...';
            retryCount = 0;
            playMedia(currentUrl, currentTitle || "Recargado");
        } else {
            alert("No hay ningún stream activo para recargar");
        }
    }

    function clearSidebar() {
        currentChannelList = [];
        channelsList.innerHTML = '';
        sidebar.style.display = 'none';
        currentLabel.innerText = '🗑️ Lista limpiada';
    }

    // 🔥 Botón para cambiar proxy manualmente
    function addProxySwitcher() {
        const headerActions = document.querySelector('.header-actions');
        if (headerActions) {
            const proxyBtn = document.createElement('button');
            proxyBtn.className = 'icon-btn';
            proxyBtn.title = 'Cambiar proxy CORS';
            proxyBtn.innerHTML = '<i class="fas fa-exchange-alt"></i>';
            proxyBtn.onclick = () => {
                switchToNextProxy();
                if (currentUrl) {
                    retryCount = 0;
                    reloadCurrent();
                }
            };
            headerActions.appendChild(proxyBtn);
        }
    }

    // ==================== Inicializar ====================
    function init() {
        initVideoPlayer();
        addProxySwitcher();
        
        playBtn.addEventListener('click', loadDirectUrl);
        parseBtn.addEventListener('click', async () => {
            let url = urlInput.value.trim();
            if (!url) { alert("📋 Ingresa URL de lista M3U o Xtream"); return; }
            await parseM3uFromUrl(url);
        });
        stopBtn.addEventListener('click', stopAll);
        miniStop.addEventListener('click', stopAll);
        reloadBtn.addEventListener('click', reloadCurrent);
        miniReload.addEventListener('click', reloadCurrent);
        clearListBtn.addEventListener('click', clearSidebar);
        
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadDirectUrl();
        });
        
        console.log("✅ FlowIPTV PRO - CORS completamente resuelto");
        console.log("🎬 Ahora reproduce igual que AppCreator 24 (ExoPlayer)");
        console.log("🌐 Proxies disponibles:", CORS_PROXIES.length);
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
</script>
