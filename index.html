<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Player PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
}

/* 🎬 FULL SCREEN REAL */
.player-container {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 📢 BANNER */
.banner {
    position: fixed;
    top: calc(6px + env(safe-area-inset-top));
    left: 6px;

    max-width: 190px;

    padding: 6px 8px;
    border-radius: 10px;

    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    color: #fff;
    font-size: 7.8px;
    font-weight: 600;
    line-height: 1.2;

    z-index: 999;

    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

.banner span {
    color: #00ffae;
    font-weight: 800;
}

.banner-item {
    display: block;
    margin-bottom: 2px;
}

@media (max-width: 400px) {
    .banner {
        max-width: 160px;
        font-size: 7px;
        padding: 5px 6px;
    }
}
</style>
</head>

<body>

<!-- 📢 BANNER -->
<div class="banner">
    <div class="banner-item">🚀 <span>IPTV Premium</span> estable sin cortes</div>
    <div class="banner-item">Web • Software • TV Box</div>
    <div class="banner-item">WhatsApp: 935-719-978</div>
</div>

<!-- 🎬 VIDEO -->
<div class="player-container">
    <video id="video" autoplay muted playsinline></video>
</div>

<script>
const video = document.getElementById("video");

const playlist = [
"https://dl.dropboxusercontent.com/scl/fi/4zbtcy2zdg1upztjvw9ty/tv_Sjow.mp4?rlkey=fz4swcg4iul7kqlq0jdt7rajk",
"https://dl.dropboxusercontent.com/scl/fi/vlyjfym5lkq74j60vv3d7/wsdw.mp4?rlkey=cefh6u2imupuuxlnb3x8g17jt",
"https://dl.dropboxusercontent.com/scl/fi/1tgi7i2xjdfuoin8b9aw1/gag.mp4?rlkey=sqzfdxe5cphqt5a2z4pz5fjn6",
"https://dl.dropboxusercontent.com/scl/fi/6v7230f6drvhrxaxc8282/scdddg.mp4?rlkey=4uf552fthex3e93i28br4t7cd",
"https://dl.dropboxusercontent.com/scl/fi/c4rifovakuhmbvds9ybq2/scdvdv.mp4?rlkey=erq3a307ywolnyev6qd8wpkjk",

// ✅ NUEVO VIDEO
"https://dl.dropboxusercontent.com/scl/fi/8uw8zryd2aekn84q2ldxe/QUIZTITKTOK.mp4?rlkey=h0bzvzpawbnc6natt15zf5331"
];

let shuffled = [];
let current = 0;

function shufflePlaylist() {
    shuffled = [...playlist]
        .map(v => ({ v, r: Math.random() }))
        .sort((a,b) => a.r - b.r)
        .map(x => x.v);

    current = 0;
}

function playVideo() {
    if (current >= shuffled.length) shufflePlaylist();

    video.src = shuffled[current];
    video.load();

    video.play().catch(() => {
        setTimeout(playVideo, 1000);
    });

    current++;
}

video.addEventListener("ended", playVideo);
video.addEventListener("error", playVideo);

shufflePlaylist();
playVideo();

/* 🔊 ACTIVAR AUDIO */
setTimeout(() => {
    video.muted = false;
    video.volume = 1;
    video.play().catch(()=>{});
}, 1000);

/* TOUCH FIX */
document.addEventListener("click", () => {
    video.muted = false;
    video.play();
}, { once: true });

</script>

</body>
</html>
